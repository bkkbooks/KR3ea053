body:
  text: 卷三齁喘解趙彥威病齁喘秋冬病作嚏噴涕流壅嗽發喘咽喉閉塞呼吸不通腹脹嘔吐得後泄失氣稍差脹微則病發略減少時素患鼻淵二十餘歲初秋晚食後偶因驚恐遂成此病自是不敢晚飯嗣後凡夜被風寒或晝逢陰雨或日炅飽啖其病即發發則二三日或八九日二十餘日方愈病十二年矣此其素稟肺氣不清肺旺於秋主皮毛而司收斂肺氣清降則皮毛緻密風寒不傷肺氣鬱升皮毛蒸泄涼風一襲腠理閉斂肺氣膹塞逆沖鼻竅鼻竅窄狹奔氣迫促出之不及故嚏噴而下如陽郁陰中激而為雷肺氣遏阻爰生嗽喘津液堙瘀乃化痰涕此肺氣上逆之病也而肺逆之原則在於胃脾以太陰而主升胃以陽明而主降經脈別論脾氣散精上歸於肺是脾之升也逆調論胃者六腑之海其氣下行是胃之降也蓋脾以陰體而抱陽氣陽動則升胃以陽體而含陰精陰靜則降脾升則肝氣亦升故乙木不陷胃降則肺氣亦降故辛金不逆胃氣不降肺無下行之路是以逆也肺胃不降病在上焦而究其根本則緣中氣之虛中氣者陰陽升降之樞軸也蓋太陰以濕土主令陽明從燥金化氣中氣在太陰陽明之間和平無虧則陰不偏盛而陽不偏衰燥不偏虛而濕不偏長故脾胃轉運升降無阻中氣虛損陰旺濕滋堙郁不運則脾不上升而清氣常陷胃不下降而濁氣常逆自然之理也飲食入胃脾土溫燥而後能化陰盛土濕水穀不消中焦壅滿是以作脹脹則脾氣更陷而胃氣更逆一遭風寒閉其皮毛肺氣鬱遏內無下達之路外無升泄之孔是以沖逆咽喉而病嗽喘雨降則濕動日暮則陰隆病所以發也日昃陽衰陰停不化中氣一郁舊證立作故不敢晚飯也吐泄去其陳宿中脘沖虛升降續復故病差也是其虛在中氣而其起病之時則因木邪以五情之發在腎為恐在膽為驚膽以甲木而化相火隨戊土下行而溫癸水相火蟄於癸水之中腎水溫暖則不恐膽木根深則不驚平日濕旺胃逆相火之下蟄不祕一遇非常之事動其神志膽木上拔而驚生腎水下淪而恐作己土侮於寒水故脾氣下陷戊土賊於甲木故胃氣上逆初因驚恐而病成者其故如是奇病論驚則氣上舉痛論恐則氣下上下反常故升降倒置此致病之原委也法當治中以培升降之用燥土而撥轉運之機所謂發千鉤之彎者由一寸之機轉萬斛之舟者由一樳之木也南齊褚澄有言上病治下凡病水火分離下寒上熱不清心火而溫腎水較之庸工頗為得矣而總不如治中中者坎陽離陰交媾之媒此義得之靈素讀唐宋以後書未易生茲妙悟也齁證即傷風之重者感冒之初內有飲食外有風寒法宜理中而兼發表表解後溫燥水土絶其寒濕之根蓋飲食未消感襲風寒濕土堙瘀肺氣不降風閉皮毛內郁莫泄表裡皆病故內外兼醫彥威病用燥土疏木溫中降濁之劑茯苓甘草乾薑細辛橘皮半夏桂枝砂仁十餘劑不再作吐血解錢叔玉初秋農事過勞痰嗽唾血紫黑成塊一吐數碗吐之不及上溢鼻孔肌膚生麻頭痛寒熱渴燥食減出汗遺精驚恐善忘通夜不瞑胸腹滯痛氣逆作喘朝夕倚枕側坐身欹血遂上湧天寒風冷或飲食稍涼吐血更甚右腳熱腫作痛大便溏滑此緣中焦陽敗水陷火飛肺主氣肝主血而氣根於心血原於腎管子南方曰日其氣為熱熱生火與氣北方曰月其氣為寒寒生水與血心火清降則化肺氣腎水溫升則化肝血血升而化火故水不下注氣降而化水故火不上炎氣降而不至於陷泄者血溫而升之也血升而不至於逆流者氣清而降之也水木不能溫升則下病遺泄火金不能清降則上病吐血理有固然不足怪也水陷火飛是謂未濟而交濟水火其職在中中者四維之樞也中氣運則脾升而胃降脾土左升肝血上行而化心火陽氣發生故精不下走胃土右降肺氣下行而化腎水陰氣收斂故血不上溢子華子所謂上水而下火二氣升降以相濟也中氣不運肝脾下陷而肺胃上逆水火分離冰炭不交此遺精吐血之原也後世庸工於亡血失精之理茫乎不解或用清涼或事斂澀陽敗土鬱中氣不轉火愈飛而水愈陷是拯溺而錘之以石救火而投之以薪也不極不止耳氣藏於金血藏於木而溯厥由來總化於土以水穀入胃中氣健旺泌糟粕而蒸津液化其精微上注於肺肺氣宣揚而灑布之剽悍者化而為陽行於脈外命曰衛氣靈樞決氣上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣也氣者水之源也精專者化而為陰行於脈中命曰營血靈樞決氣中焦受氣取汁變化而赤是謂血也血者火之本也勞苦動其中氣絡脈傷則血溢靈樞百病始生卒然多食飲則腸滿起居不節用力過度則絡脈傷陰絡傷則血內溢血內溢則後血陽絡傷則血外溢血外溢則衄血中氣未敗一衄即止中氣虧敗肺胃常逆則血之上溢遂成熟路是以橫流不已衄出於鼻來自肺臟吐出於口來自胃腑血之別道上溢者來歷不同而其由於肺胃之不降一也其一溢而即吐者血色紅鮮其離經瘀停陳宿腐敗而後吐者則成塊而紫黑也肺氣下降而生腎水而腎水之中又含肺氣越人八難所謂腎間動氣呼吸之門也平人呼則氣升於肺金吸則氣降於腎水息息歸根故嗽喘不作胃土上逆肺失收降之令氣不歸水而胸膈壅遏故沖激而生嗽喘也肺胃不降則膽火不得下行金火燔蒸故發熱汗出而風寒外束衛氣不達是以惡寒陽衰土濕水穀不消而食寒飲冷愈難腐化中焦壅滿肺胃更逆故血來倍多風閉皮毛肺腑郁閼故嗽喘增加而血來益甚肺氣堙瘀津液凝結故痰涎淫生陽氣靜藏則為寐肺胃不降陽氣升泄蟄藏失政故夜不成寐膽火虛浮不根於水心神浮散不藏於精故善驚而善忘君相皆升寒水獨沉腎志淪陷是以恐也脾胃凝滯中氣不能四達故經絡閉塞而為麻緣衛氣壅塞郁衝於汗孔之中不得暢行故籟籟麻生如萬針錯雜而攢簇也陽氣下降先至右足陽氣不降經脈淤滯故右腳腫痛營衛梗阻故鬱而生熱不降於足而逆沖頭上故頭痛也總之中氣不運則升降之源塞故火炎於上水流於下木陷於左金逆於右而四維皆病法宜補中而燥土升陷而降逆陽回濕去穀神來蘇中樞已運四維自旋隨推而轉因蕩而還水火金木皆得其處而安其常然後陰營其臟陽固其腑氣充而不盈血滿而不溢鱗飛羽伏各復其太和之天已叔玉病失血年餘已數十日不臥自來醫方失血遺精驚悸嗽喘皆用清潤之法未有知其陽虧濕旺者百不一生千秋不悟既非徹識安能洞詳用燥土降逆溫中清上之品茯苓甘草半夏乾薑丹皮牡蠣桂枝白芍月餘病愈庸工誤解本草謂血證最忌半夏由其不知醫理也驚悸解陳夢周患作酸噯氣頭暈耳鳴春季膈熱火升頭痛手麻驚悸不寐善忘左乳下跳動不息每午後膝冷病作雞鳴膝溫而輕平旦膝暖而差服燥土疏木之藥飽食甘寢但胸有火塊遊移上下左右時時衝擊微痛心跳未已初秋膝冷又發項脊兩肩作痛面顴浮腫噴嚏時來四肢拘急心跳連臍遍身筋脈亦動八月後睡醒口苦舌根乾燥每夜雞鳴膝冷病作午後膝溫而輕日夕膝暖而差病來計粒而食飲啖稍過脹悶不消滯氣後泄略啖瓜果便覺腹痛食粥則吐稀痰晚食更多此緣土濕不運陽氣莫藏心藏神腎藏精人之虛靈善悟者神之發也睹記不忘者精之藏也而精交於神神歸於精則火不上炎水不下潤是謂既濟精不交神則心神飛越不能知來神不歸精則腎精馳走不能藏往此善忘之由也精根於神及其右降而為金則魄具而精生神根於精及其左升而為木則魂成而神化子華子所謂精秉於金火而氣諧於水木也今火炎於上則金被其克而不降水潤於下則木失其政而不升矣木自東升尚書洪範木曰曲直曲直作酸曲者木氣之不直也木性直遂升達發榮滋暢故不作酸曲折抑鬱不得直上則盤塞地下而克脾土土困不能消化水穀故變稼穡甘味腐而為酸土主五味其味為甘一得木氣賊傷則甘化而為酸也以五行之氣陽降陰升則水旺而為寒陽升陰降則火旺而為熱陰方升而陽方降則金旺而為涼陽方升而陰方降則木旺而為溫陽之動始於溫而盛於暑陰之靜始於涼而盛於寒物惟溫暖而加覆蓋氣不宣揚則善酸方熱既涼已寒不作此味譬之釜水薪火未燃是水之寒火燃未沸是木之溫爐紅湯沸是火之熱薪盡火熄是金之涼後世庸工以酸為熱豈有鼎沸而羹酸者乎悸者乙木之郁沖驚者甲木之浮宕乙木之枝葉敷舒於上甲木之根本栽培於下則驚悸不生乙木不能直升枝葉上郁肝氣振搖則善悸甲木不能順降根本下拔膽氣虛飄則善驚頭耳者少陽膽經之所絡也甲木下降則濁氣退藏上竅清空甲木上逆濁氣升塞故頭暈而耳鳴甚則壅遏而頭痛也膽氣上溢則口苦奇病論肝者中之將也取決於膽咽為之使此人數謀慮不決故膽氣上溢而口為之苦膽木化氣於相火相火上炎故作苦也相火下蟄則水溫甲木失根火泄水寒是以膝冷相火逆升是以膈熱甲木衝擊是以胸痛也金自西降尚書洪範金曰從革從革作辛革者金氣之不從也金性從順降斂清涼肅靜故不作辛革礙郁遏不得從下上被火刑則生辛味肺主氣而司皮毛肺氣鬱升收令不遂皮毛疏泄感襲風寒則生嚏噴以肺主呼吸而呼吸之氣直達腎水故腎水之中亦有肺氣越人八難所謂腎間動氣呼吸之門也吸隨陰入呼因陽出肺心為陽腎肝為陰四難呼出心與肺吸入腎與肝一呼自腎而至肺一吸自肺而至腎其息深深故噴嚏不作肺氣不降而皮毛不闔積鬱莫泄逆沖鼻竅鼻竅迫狹出之不及故作噴嚏如藥在炮中激而為響也肺氣逆行橫塞肩脊故作痛壅閼頭面故作腫也左右者陰陽之道路也木陷於左金逆於右陰陽之道路塞矣而不可徒求之左右必責中氣之虛胃為陽土脾為陰土陽土順降陰土逆升脾升則平旦而後乙木左升胃降則日夕而後辛金右降木升則陽氣發生而善寤金降則陽氣收藏而善寐脾土不升則木鬱於左而清晝欲寢胃土不降則金鬱於右而終夜不睡寤寐者衛氣所司衛氣晝行於陽夜行於陰陽盡則寐陰盡則寤隨中氣而出入也胃土不降收氣失政衛氣不得入於陰常留於陽留於陽則陽氣盛不得入於陰則陰氣虛故目不瞑陰氣虛者陰中之陽氣虛非精血之虧損也蓋陽動而陰靜靜則睡動則醒衛不入陰陽泄而失藏浮動無歸故不能寐孤陰無陽故曰陰氣虛也胃土不降由於太陰之濕靈樞邪客有半夏秫米之法半夏降逆秫米瀉濕秫米即高粱米善瀉濕氣深中病情仲景而後此義不傳矣肝藏魂肺藏魄靈樞本神隨神往來謂之魂並精出入謂之魄以神發於魂肝之魂生則胎心神故魂含子氣而知來精産於魄肺之魄結則孕腎精故魄含子氣而藏往胃土上逆肺金不降陰魄浮升不能並腎精下蟄故往事遺忘而不藏也中氣運轉脾陽升動則飲食磨化濕旺脾郁飲食不化故過啖則脹子華子流水之不腐以其逝也水穀陳宿脾土鬱陷抑遏乙木不得發揚故瘀生酸味肝氣不達而時欲發舒故當臍而跳中氣不轉胸腹悶塞故上噯而下泄也左乳下者胃之虛里素問平人氣象胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣宗氣泄也宗氣在胸降於少腹平人喘息動見少腹者宗氣之升降也胃氣既逆肺無降路宗氣不能下行故橫衝於虛里失其收斂降蟄之性泄而不藏故曰泄也此與心下之悸動異委同源木不得直升則動在心下金不得順降則動在乳下總緣胃氣之上壅也肺胃升填收令莫行甲木莫由下達相火泄越是膝冷髓寒之本陽衰土濕再以薄粥助之故氣滯痰生得之日晚濕旺之時故痰涎愈多四肢秉氣於胃脾病不能為胃行氣於四肢故拘急而生麻寒水侮土中氣愈滯故膝冷則病作陽氣春升而秋降陰氣春降而秋升一日之中亦分四時其陰陽升降與一歲相同靈樞根結發於春夏陰氣少陽氣多發於秋冬陽氣少陰氣多春陽上升則地下之陰多故陽升之時午後陰升而膝冷秋陽下降則地下之陽多故陽降之時雞鳴陰降而膝冷素問厥論陰氣起於五指之裡陽脈者集於膝下而聚於膝上故陰氣盛則從五指至膝上寒其寒也不從外皆從內也膝臏者溪谷之會機關之室精液之所朝夕也寒水歸壑流注關節故膝臏寒冷所謂腎有邪而氣流於兩膕也治法惟宜燥土土居二氣之中以治四維在陰而陰在陽而陽隨四季而遞變土旺則上清下溫升左降右稍助其推遷而南北互位東西貿區靜與陰同閉動與陽俱開成然寐遽然覺經目而諷於口過耳而識於心泰山崩而色不變迅雷震而心不搖神宇泰定諸病俱消矣驚悸之證陽敗土濕後世庸工以為陰虧歸脾補心諸方謬妄極矣夢周平日強記善睡涉秋病作服歸脾六味諸藥大損眠食惕然驚悸通夜不寐年逾六十中氣衰弱而常服滋潤伐其微陽神思荒浪欲作阜落國人其老矣何以堪此哉宋書謝晦與檀道濟將發滎陽晦其夕悚動不眠道濟就寢便熟何其膽壯如是是宜瀉濕降逆以培甲木甲木根深自當寵辱不驚世之醫士未窮夢覺之關神浮於上而散以遠志陽敗於中而伐以地冬火滅於下而瀉以梔柏彼直真夢者矣何以使夢者之覺乎悲夫晉唐而後世閲人而為世者多矣但守癊奧之螢燭不仰天庭之白日是使長夜杳杳千秋不寤己且未覺而偏能覺人設遇傷寒少陰善寐之證又能使人長睡不覺矣可勝嘆哉悲恐解邵熙伯病驚悸悲憂二十年中病凡四發初發四月而愈後發愈期漸晚或至數年發則數月不食不寢飯至疑有毒藥絶粒不嘗便數遺精多欲好淫膝冷心涼欠伸太息憂愁思慮驚懼悲惋常恐見殺尸碎體分逢人求救屈膝哀懇獨處則泣下沾衣時或自剄幾死使人守之靜夜磨笄自刺室中錐刀繩索之類盡為收藏乃私服大黃瀉下求死凡諸病象每發皆同此緣火敗土濕金水俱旺肝之氣為風心之氣為熱脾之氣為濕肺之氣為燥腎之氣為寒此五臟之氣也肝之志為怒心之志為喜脾之志為憂肺之志為悲腎之志為恐此五臟之志也凡一臟之氣偏盛則一臟之志偏見悲者燥金之氣盛恐者寒水之氣盛憂思者濕土之氣盛也肝木主生肺金主殺木囚火滅金燥無制則殺機常動方盛衰論肺氣盛則夢見斬血籍籍人於醒後神氣浮動臟真之盛衰不能自覺寐而和氣寧謐靜中獨覺故臟中之盛衰形而為夢談子所謂醒不靈而夢靈也夢中覺者盛未極也盛之極則不夢而亦覺之金旺木枯但覺殺氣之烈而無生意之萌肢骸分裂恍在目前故時欲自剄冀得完尸而死金旺則欲哭是以悲涕流連也金匱婦人臟燥喜悲傷欲哭是其肺金之燥也金為水母燥金生其寒水是以恐作蓋人之五志神氣升達則為喜將升未升喜之弗遂則鬱勃而為怒精氣淪陷則為恐將陷未陷恐之欲生則淒涼而為悲木火衰而金水旺故有悲恐而無喜怒水寒則火滅金燥則木傷故也腎主蟄藏肝主疏泄火泄水寒不能溫養肝木而水泛土濕陷遏乙木升達之氣生髮不遂則愈欲流泄其性如是遇夜半陽生宗筋一舉則夢交接木能疏泄而水不蟄藏是以精遺溫氣常陷不得升達而化君火是以好淫總緣生氣之失政也精藏於腎水藏於膀胱脈要精微論水泉不止者是膀胱不藏也膀胱之藏泄司於三焦靈樞本輸三焦者入絡膀胱約下焦實則閉癃虛則遺溺然水道之通塞雖在三焦而其疏泄之權實在乙木以相火祕藏腎水溫暖則肝氣升達膀胱清利疏泄適中而小便常調相火不祕泄於膀胱腎寒不能生木郁陷而欲疏泄火旺則膀胱熱澀泄而不通火衰則膀胱寒滑泄而不藏人之大恐而便溺俱下者水寒火敗而木氣陷泄也膽以甲木而化相火亦與三焦同歸癸水根深蒂固則驚駭不生三焦陷泄甲木逆飄膽氣虛浮故生驚駭相火者君火之佐相火敗而君火熄寒水上凌故病心涼四氣調神論逆夏氣則太陽不長心氣內洞夏為寒變以夏暑之月而熱火變為寒灰至於三時則霜雪不能喻其冷湯火不能使之溫矣君火失職陽不歸陰則衛氣常浮夜不成寐人之衛氣日行陽經二十五度夜行陰臟二十五度其行於陽也常以平旦從足太陽而出於內眥其行於陰也常以日暮從足少陰而入於陰分衛氣入陰則火交於水神歸於精一身之陽氣悉退於至陰之中群動皆息是以能寐衛不入陰魂神飛宕故終夜不寢衛氣入陰原於胃氣右降金水收藏胃土不降收藏失令是以衛浮而不入也陽明胃氣下行則開上行則閉脾胃為倉稟之官人之食下者倉稟開也胃土上逆倉稟不開故食不下咽下咽則嘔胃土不降全因於濕火敗不能生土寒水泛濫入土化濕金旺木枯土邪無制濕土司氣而風木不承中氣於是不運故升降倒行胃土上逆而廢飲食脾土下陷而善憂思也濕土在中水冷金涼木衰火熄變生諸證奇詭異常而實非怪病治法以燥土為主而溫暖金水長養木火使恐化為怒悲轉為喜則臟氣平均情志調和矣呂氏春秋齊王疾痏灸瘢也謂灸後病癲使人之宋迎文摯文摯至謂太子曰王之疾必可已也雖然王之疾已則必殺摯也太子曰何故文摯曰非怒王則疾不可治王怒則摯必死太子頓首強請曰苟已王之疾臣與臣之母以死爭之於王王必幸臣與臣之母願先生勿患也文摯曰諾請以死為王與太子期而將往不當者三齊王固已怒矣文摯至不解履登床履王衣問王之疾王怒而不與言文摯因出辭以重王怒王怒而起疾乃遂已王大怒將生烹文摯太子與王后爭之而不能得文摯遂烹焉東漢書一郡守病華他以為盛怒則差乃多受其貨而不加功無何棄去又留書罵之太守果大怒使人追殺之不及因瞋恚吐黑血數升而愈熙伯病與此同蓋木虛不能制土土之濕盛則善思金燥則善悲水寒則善恐水寒不能生木故不怒木枯不能孕火故不喜怒則木旺而剋土生火而剋金土位之下風氣承之則土燥而剋水故病可已熙伯病先發時將愈必有怒色經所謂思傷脾怒勝思者至理不爽也第其膽破魂亡百計激之絶不敢怒用燥土培木溫金暖水之劑十餘日後小有不快怒氣勃然遂瘳飧泄解崔季長素病腿膝寒冷日暮環臍腹痛脹滿作泄陽痿肩寒服燥土疏木藥愈夏初童試勞倦病發吐黑血數日飲食不甘脹滿吐泄腹中鬱熱積塊墳起泄則氣塊宣鳴而下小便紅澀日夕臍腹痛連左脅往來寒熱作酸噯氣壅嗽生痰四肢酸涼膝股如冰時常倦睡夜臥膕中作痛仰臥沖氣上奔左側衝氣橫塞滿腹劇痛惟右脅著席此緣水寒土滯金木結轖人身臍居上下之間太陰陽明之中氣也中氣盛則運衰則滯運則清虛衰則脹塞關尹子所謂實即虛而虛即實也飲食入胃脾土消磨中氣運行是以不脹水穀腐化精華升而渣滓降津液滲於膀胱渣滓傳於二陽便溺分途故前不至淋而後不至泄陽衰土濕不能蒸水化氣而與渣滓並注二腸水漬濕旺脾氣鬱陷抑遏乙木不得升達木氣鬱沖故作痛脹木性升泄遏於濕土之下衝突擊撞不得上達則下走二腸以泄積鬱水在二腸不在膀胱故乙木沖決膀胱閉塞而大腸泄利也靈樞口問中氣不足溲便為之變正此義也蓋脾胃者倉廩之官脈要精微論倉廩不藏者是門戶不要也腎開竅於二陰是為胃之關門腎以癸水居土之下心以丁火居土之上而水交於火則濁氣下降而上不熱火交於水則清氣上升而下不寒陰陽應象論寒氣生濁熱氣生清火不上熱則濁生而右降水不下寒則清生而左升濁氣在下故上不脹清氣在上故下不泄而水火之交全恃乎土土者如車之輪如戶之樞四象皆賴以為推遷子華子陽之正氣其色赤陰之正氣其色黑上赤下黑左青右白黃潛於中宮而五運流轉故有輪樞之象焉輪樞運則火下炎而濁降水上潤而清升是以坎離獨斡乎中氣土虛則鳥飛而上魚動而下火則上炎水則下注濁氣在上則生䐜脹清氣在下則生飧泄脹泄者太陰脾土之濕盛也土生於火而敗於水火旺則陽明盛而濕亦化燥水旺則太陰盛而燥亦化濕燥則運行濕則滯塞運行則谷消而便堅滯塞則完穀而後泄調經論志有餘則腹脹飧泄腎藏志而氣寒志有餘者寒水泛濫入土化濕木鬱風動是以脹泄並作也太陽以寒水主令手太陽化氣於寒水故丁火常熱而丙火常清少陰以君火主令足少陰化氣於君火故癸水常溫而壬水常寒今癸水反寒而壬水反熱此以下焦之火泄也靈樞本輸三焦者足太陽少陰之所將太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺三焦之火祕於腎臟則腑清而水利泄於膀胱則腑熱而溺澀以水性蟄藏木性疏泄相火內祕癸水溫暖此乙木生髮之根火敗水寒乙木不生益以濕土陷遏生髮不遂而愈欲疏泄故相火離根泄於膀胱乙木常陷則腎精不藏泄而不通則小便不利此癸水寒滑壬水熱澀之原也三焦之火隨太陽寒水下行祕於癸水而不泄者寒水蟄藏之力也手之六經皆行於手惟三焦之下腧在足太陽之前出於膕中下貫腨腸而入於外踝腎得此火癸水溫暖故骨髓不寒二十四難所謂少陰冬脈伏行而溫於骨髓也火泄髓寒則腿足不溫膝臏者溪谷之會寒水下流溪谷凝沍故膝冷倍常也足太陽入於膕之外廉脈動委陽足少陽出於膕之內廉脈動陰谷經絡寒沍血澀而筋急夜臥寒增而氣滯故相引而痛也寒水不生乙木筋脈失榮故病陽痿肝主筋而脈循於陰器前陰者筋之聚故名宗筋木生於水而長於土痿論陽明者五臟六腑之海主潤宗筋陰陽總宗筋之會會於氣街而陽明為之長足之三陰陽明少陽沖任督蹺九脈同會於宗筋而獨長於陽明者以陽明為多氣多血之經氣以煦之血以濡之筋脈滋榮則堅硬不痿水寒土濕生長失政木氣鬱稿故陽痿而囊縮也寒熱者陰陽勝復之故屬在少陽少陽居二陽三陰之中半表半裡午後陰長陽消陰盛而侵陽分表閉而寒來陽復而侵陰分里鬱而熱來勝復迭乘則往來寒熱凡病一見寒熱是為外陽內陰二氣不和表裡陰盛則但寒而不熱表裡陽盛則但熱而不寒里陰表陽均勢相爭則見寒熱從此陰勝陽奔乃至惟有惡寒抑三陰而扶二陽當為預計也肝膽不調總由土濕土濕則脾陷而胃逆脾陷則乙木不升而鬱衝於下胃逆則甲木不降而鬱衝於上木位於左故痛連左脅肝膽左郁故氣結而作酸土困木賊故臍腹作痛也胃逆則肺無降路刑于膽火而病嗽咳肺司氣而主聲關尹子金堅故實為五聲以肺之為體孔竅玲瓏清氣飄揚沖而不盈呼之則氣升於顛吸之則氣降於踵息息歸根孔竅無阻是以不嗽肺氣逆升衝於孔竅竅阻氣塞則嗽而出之故戛然而鳴生氣通天論所謂秋傷於濕上逆而咳者正謂此也人身之氣足陽明化氣於燥金手太陰化氣於濕土者常也燥勝其濕則肺金收降濕勝其燥則肺金鬱升今手太陰化己土之濕足陽明不化庚金之燥胃土上逆而濕氣堙塞則津液瘀濁而化痰涎日見其多耳土困於中而四維皆病治法燥土暖水疏木達郁清金降逆水溫土燥則土氣回旋木升金降痰消而嗽止水利而便調矣季長病泄半載為庸醫誤藥已至危急用溫中燥土暖水達木之方腹中滯氣一啜而散陽氣浸淫見於眉宇之間數劑泄止庸工以脹泄為脾氣之散用五味木瓜山莫芍藥諸品中氣鬱結而再服酸收是益其源而障其流也至於十全大補一方真俗腐之妄作人每用以治泄利不通之至腸澼解田西山鄉試旅中飲冷露臥因病下痢日百餘次少腹痛墜繞臍氣塊如石數道上攻左脅更甚痛叫不已胸膈若燒肛門如烙小便熱澀氣街大筋突起跳動鼓指發手熱氣下於兩股狀如湯沃陽縮囊皺蜷臥膝冷譫語離魂不食數日矣此其中焦寒濕上下俱熱常人胃土右降則甘飲食脾土左升則化水穀胃降則甲木不逆脾升則乙木不陷木氣無郁故上下衝和痛脹不生飲食寒冷傷其脾陽不能蒸水化氣水穀並下注於二腸水氣浸淫脾土濕陷抑遏乙木不能升達肝氣鬱沖故生痛脹木以升泄為性既不上達則下決二陰以泄糞溺水在二腸不在膀胱故小便不開而大便不闔水去土燥肝脾升運泄利自止脾陽陷敗寒濕愈增則泄利不止遂便膿血蓋乙木直升糟粕順下隧道無阻故脂血不傷乙木鬱陷滯氣梗塞糟粕不能順行脂血摧剝與之俱下是以作痛君火胎於乙木溫氣陷遏不得上化君火故生下熱濕邪淫蒸脂血腐化是以成膿乙木陷於大腸沉墜不升是以後重久而脂血傷殘刮迹而去侵及臟腑中氣潰敗是以死也陽明以戊土而化燥金金燥則能收降故陽明之氣善於下行太陰之濕勝其陽明之燥則脾既下陷胃亦上逆胃逆則甲木無下行之路甲木化氣於相火相火上炎是以胸膈煩熱君相同氣二火燔騰心神擾亂是以譫語膽木失根相火鬱升營血不謐是以魂離膽位於左經絡痞塞是以結梗下行無路是以逆沖而上也氣衝者陽明動脈在毛際之旁腿腹之交陽明之氣不遂其下行之性故氣衝即氣街郁蓄而生跳動靈樞百病始生虛邪之中人也其著於伏沖之脈揣之應手而動發手則熱氣下於兩股如湯沃之狀痿論衝脈者經脈之海主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長陽明多氣多血而衝脈又與諸筋總會陽明之氣街穴腧充滿故氣街之動脈常大伏沖即衝脈之深而在脊者風寒襲於衝脈郁其經氣盛滿莫容走陽明而歸氣街是以跳動鼓指也是其上熱在於少陽下熱在於厥陰而上下鬱熱之根則由己土之濕土濕之故則由癸水之寒後世庸工以為痢證無寒不知其熱並不在於中焦況三焦皆寒上下無熱者亦復不少而以硝黃重瀉胃氣濕寒愈增輕則生鼓脹之病重則死矣大凡新秋病痢皆暑夏生冷之所傷俗醫以為暑邪而用寒攻無有不誤者也治法當瀉土濕而疏木鬱其熱盛者涼行其滯其寒盛者溫行其結令其脾燥肝升凝結通達瘀清腐掃脂血調和則痛墜全瘳膿血弗下矣至於歷代醫書痢證諸方荒唐不經未足深辨也西山平素尚儉量腹而食度身而衣病不服藥已至危劇診之尚可救挽而自分不起意欲勿藥謂半月以來神魂迷離精魄荒散竊覺病勢已革盧扁復生恐難為力君且莫喧以擾余心僕與西山童稚交善解而慰之曰今盧扁在此公未見知耳若得靈藥一匙即可返魂勿恐用燥土溫中行閼散滯清膽達木之方強而飲之一服而差遂不再服月餘扶杖而行善飢善後食入俄頃即下問何以故僕聞語大笑公少服藥數劑此成洞風矣史倉公傳陽虛侯相趙章齊淳于司馬皆嘗病此公脾土未調土鬱風旺疏泄水穀腸胃空洞風木不達中氣難復也問此可無患恐之曰趙章之病倉公以為法五日死公尚無子那可惜此小費為後世嗤耶曰淳于司馬何以不死吾命在天不在吾子之手言之再四不聽如此數月後竟無恙但右手戰麻寫字艱難每為考試所苦終不服藥也脾胃解業師於子蘧司鐸金鄉録證來問自來飲食不多今止三分之一稍多即傷食泄利魚肉絶不思食食棗數枚即發熱食柿餅半枚即欲泄陪客茶多晚即不寐不食晚飯十餘年矣飲食調適終日不唾若晚飲杯酒略服溫燥則痰唾黏聯長如唾絲睡即涎流大便成粒每晚將睡必思登溷小便短少夜醒必溺五更水穀消化此時更覺溺多晨起必渴飲食亦甘平素氣稟如是往時自制加減四君丸黃耆白朮茯苓橘皮甘草當歸遇脾胃寒濕便服一二次甚覺有效向來不敢飲酒及食諸燥熱之物六月食涼粉霍亂嘔吐並作八月六日食黍糕半枚午後省牲在明倫堂嘔吐原物自此飯後常覺氣逆欲吐左脅貼乳上衝喉下隱隱似痛半日食消方才氣順服四君丸發熱面赤耳後如火兩眥痠痛胸腹燥渴啖黃梨半枚而愈是後每日啖梨乃安往日一食便泄今止大便潤濕不似從前結若羊矢而已吾恐飯後欲吐將成反胃證則可慮矣前時腰痛腿重此際已愈但坐臥少久不能遽起是老年常景非關病也但有還少仙方自當更妙但恐不能耳偶服六味丸即覺腹中寒滯服八味三劑後更覺燥熱耳後如火或謂附桂少故非也吾臟腑大概寒熱俱不受須不寒不熱不燥不濕平中帶補之劑乃可此意與縣中醫士言之為吾制兔絲丸服之甚不佳而四君丸平日最效今便燥熱不受大抵漸老漸衰甚有血虛火起之意當用何藥治之人還即寄方來詳觀平日舊證自來飲食不多漸老漸減稍多即傷食作泄此脾氣之弱也脾為太陰濕土陽明之燥足以濟太陰之濕則脾陽升運水穀消磨濕旺燥衰中氣莫運多食不能消化故病泄利肉食更難消磨過時陳宿反傷胃氣是以不思食食棗生熱者甘緩之性善滯中氣土滯則脾陷而胃逆胃逆而甲木不降相火上炎是以生熱非大棗之性熱也食柿餅作泄者寒敗脾陽也茶多不寐者陽氣收藏則為寐收藏之權雖關金水降蟄而金水降蟄之原實由戊土之降茶多滋其土濕陽明不降金水失收藏之政故神魂升泄而不寐也不食晚飯者日暮陽衰不能腐化耳晚飲杯酒痰生涎流者酒助土濕濕動胃逆津液堙郁則化痰涎下行無路是以逆行也大便成粒硬若羊矢者下焦陰旺腸竅約結糟粕傳送不能順下下而輒閉蓄積既多乃復破隘而下下而又閉零星續下不相聯屬大腸以燥金主令而手足太陰濕旺津瘀但化痰涎不能下潤大腸是以燥結成丸枯澀難下實非下焦之陽盛也晚思登溷者陽衰濕動肝脾郁陷也夜多小便者子半陽生水穀消化也便多水利土燥故思飲而甘食四君丸朮甘補中茯苓瀉濕橘皮利肺當歸滋肝與臟氣頗合是以能效近食涼粉吐泄寒濕傷脾黍糕膠黏難化原物湧吐陽明胃氣本自下行屢嘔氣逆因而上行飯後中焦鬱滿胃氣不下是以欲嘔胃逆則膽無降路亦遂上衝膽位於左故左脅沖喉隱隱而痛食消而膽胃皆降故氣順也平時頗宜四君丸今乃燥熱不受非藥性之熱乃中氣之愈衰也歸耆朮甘壅滯不行茯苓橘皮不能開其鬱塞君相之火不得歸根遂生上熱與食棗發熱之故理相同也梨以甘寒疏利之性清其鬱熱是以渴燥皆止兔絲收斂固澀與濕旺土鬱之證愈為助虐甚不宜也八味暖水滋木與肝腎燥寒未為相反但以地黃入胃留戀濕土濕動胃逆則附子不能下溫癸水而反助甲木上炎之火耳後火起少陽膽經絡於耳後故也何關桂附多少乎六味滋濕伐陽原屬庸工妄作更與此證相左矣法宜燥土暖水疏木達郁水溫土燥木達風清脾旺濕消神氣漸盈百齡易得還少仙方何其不能素問生氣通天論聖人服天氣而通神明陰陽應象論能知七損八益則耳目聰明身體輕健老者復壯壯者益治年高之人陽衰陰旺是以易老若以藥物抑陰扶陽本有還童之理而愚味以為妄誕此下士聞道所以大笑也至於素稟臟氣雖與人別而寒熱燥濕一切不受是方藥之差誤非宜寒不受寒宜熱不受熱也此以腸胃柔脆不堪毒藥少服便效未宜多用也十一月初先生又録證來問吾十月十五生日行香後使客紛紜頗勞酬酢飯畢腰痛脊骨兩旁筋急如扯舊病復發又因初五六日每晚飲酒數杯濕熱鬱積遂成此證十六日大勢已差尚能回拜客進縣署誤服八味丸腰彎不能立行痛連脊背乃服羌活獨活白朮地黃杜仲甘草二劑背痛少減而不能行立如故又服左歸飲加自朮葳蕤痛如前且覺大便燥腹內熱兩膝酸熱乃服當歸地黃飲加黃芩梔子五分晨起破腹兩三次身頗輕爽腰微能直火氣似去其痛乃移左胯因往年病虐左半傷耗上年腿腫亦在左畔此時漸輕但不及未痛前耳今欲去黃芩梔子第服當歸地黃飲昨日已服一劑大便尚未滋潤而脾甚覺其濕思欲空腹服之壓以乾物未審何如前悉腰痛一證已獲康愈今又因飲酒動濕脾土鬱陷肝氣抑遏盤塞腎部而生痛楚腎位於腰為肝之母子氣不能生髮是以腰痛也誤服八味助其土濕木氣更遏是以痛劇張景嶽之左歸飲服之脾濕愈滋木鬱風生而成燥熱歸地梔芩寒濕敗脾木鬱作泄泄後鬱熱清利是以微差而肝氣益陷故痛移左胯實明減而暗增非藥效也前此已為誤用若今後常服土濕日滋而脾陽日敗斷不可也大便之燥全緣脾濕濕去陽回飲食消化精華升布津液降灑大腸滋潤自然便調倘以歸地滋濕變結燥而為滑溏則脾陽虧敗為禍深矣火逆解王文源平日膈上壅塞常吐清痰冬夜心驚火發下自足心上自踹內直衝心胸胸膈痞悶咽喉閉塞耳鳴頭眩氣虛心餒四肢無力遍身汗流煩躁飲冷得食稍差小便清數大便重墜陰精欲流胸腹腰脊表裡皆熱手足獨涼將愈則沖氣下行漸而火降煩消小便熱黃乃瘳五六日半月一作凡腹中壅滯或食肉稍多則發先時足心常熱近則溺孔亦熱醫用六味八味不受病已四年矣此緣土濕胃逆相火上炎足少陽以甲木而化相火自頭走足下行而溫癸水癸水蟄藏相火不泄則腎臟溫暖而上下清和癸水不蟄相火升泄下自九原上出重霄變清涼之境為曦赫之域是以煩熱而燥渴也陽根下拔浮越無歸故耳鳴頭眩擾亂不寧以少陽經脈自鋭眥而繞頭耳也熱蒸竅泄是以汗流君相同氣心火升浮不根腎水故虛餒空洞欲得穀氣足心者足少陰之湧泉少陰之脈自足心循踹內出膕中上絡於心循喉嚨而挾舌本相火泄干湧泉之下故根起足心自少陰腎脈逆行而上也其足心溺孔之熱者手少陽相火之陷也足少陽從相火化氣病則上逆手少陽以相火主令病則下陷以足之三陽自頭走足其氣本降手之三陽自手走頭其氣本升降者不降而升者不升反順為逆是以病也少陰主藏手足少陽之火祕藏癸水之中則濁氣不逆清氣不陷故上熱不生下熱不作少陰失藏甲木常逆則三焦常陷陷於少陰之經則熱在足心陷於太陽之腑則熱在溺孔靈樞本輸三焦者足太陽少陰之所將太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺三焦之火陷於水底淪落湧泉之下則不在州都之中故膀胱寒滑而溲溺清數是即虛則遺溺之義也及火退病除溺孔方熱是相火不歸水臟而又陷於水腑此乃異日甲木飛騰之原也甲木之降機在戊土戊土降則肺金能收腎水善藏戊土右轉金水得收藏之政此膽火所以下行也戊土上逆濁氣升填肺無下行之路收斂失政則膽火不藏遇飲食弗消中氣鬱滿胃土全逆肺金盡革則膽火拔根而上炎是旋至而立應者也其發於食肉中滿之際者土氣堙塞窒其四運之軸是以胃逆而病作耳胃腑既逆脾臟必陷陷遏乙木升發之氣不得上達必將下泄故精欲前流而糞欲後失也胃逆脾陷由於土濕而土濕之故全因寒水之旺土不剋水而寒水泛濫反得侮土土被水漬既濕且寒運化之機遲蹇失度一得肥膩不能消腐凝滯愈增則升降悉反烏得不病耶土旺四季人之四肢即歲之四季四肢秉氣於脾胃而寒濕在中流注肢節故手足厥冷改其溫和之常也是宜燥土降逆以蟄相火土燥陽回中氣旋轉升降復職水火歸根君相寧謐則膽壯而神清驚駭不生煩熱不作矣唐太僕王冰注素問發壯水益火之言嗣後薛立齋趙養葵高鼓峰呂用晦輩祖述其説乃以六味壯水退膈上之熱以八味益火除臍下之寒不知下寒上熱緣於土敗地黃滋濕伐陽潰敗脾土服之上熱愈增下寒更劇是以水益水以火益火也土敗陽亡則人死矣至於今日惡風布揚遍滿天下此實仁人君子之所深憂也自醫理失傳火逆上熱之證概謂陰虛肆用歸地敗土枉殺生靈至於妖魔下鬼乃以龜板天冬知母黃柏瀉其微陽得之立死其禍更慘此劉朱之遺毒也君子不操燮理之權以康斯世見此群凶屠毒萬代安能默默無言耶治文源病用燥土降逆暖水蟄火之法十餘劑不再發
