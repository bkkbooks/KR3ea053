body:
  text: 卷一胎化解兩精相摶合而成形未形之先爰有祖氣人以氣化而不以精化也精如果中之仁氣如仁中之生意仁得土氣生意為芽芽生而仁腐故精不能生所以生人者精中之氣也天地之理動極則靜靜極則動靜則陰生動則陽化陰生則降陽化則升關尹子無有升而不降無有降而不升降者為水升者為火河圖之數天一生水地六成之此陽之動極而靜一陰生於午也陰盛則下沉九地而為水而其生水之根則在於天地二生火天七成之此陰之靜極而動一陽生於子也陽盛則上浮九天而為火而其生火之根則在於地天三生木地八成之陽自地生未浮於天而為火先升於左而為木得乎天者親上陽動而左升故曰天生地四生金天九成之陰自天生未沉於地而為水先降於右而為金得乎地者親下陰靜而右降故曰地生凡物先生而後成故以初氣生而終氣成天與地旋相生成者獨陽不能生獨陰不能成也知天道則知人道矣男子應坎外陰而內陽女子象離外陽而內陰男以坎交女以離應離中之陰是為丁火坎中之陽是為壬水陽奇而施陰偶而承丁壬妙合凝蹇而成陰陽未判是謂祖氣氣含陰陽則有清濁清者浮輕而善動濁者沉重而善靜動靜之交是曰中皇中皇運轉陽中之陰沉靜而降陰中之陽浮動而升升則成火降則成水水旺則精凝火旺則神發火位於南水位於北陽之升也自東而南在東為木陽之在東神未發也而神之陽魂已具魂藏於血升則化神陰之降也自西而北在西為金陰之在西精未凝也而精之陰魄已成魄藏於氣降而生精升降之間黃庭四運土中之意在焉是曰五神五神既化爰生五氣以為外衛産五精以為內守結五臟以為宮城開五官以為門戶腎以藏精開竅於耳生骨而榮發心以藏神開竅於舌生脈而榮色肝以藏魂開竅於目生筋而榮爪肺以藏魄開竅於鼻生皮而榮毛脾以藏意開竅於口生肉而榮唇氣以煦之血以濡之日遷月化潛滋默長形完氣足十月而生乃成為人其或男或女者水火感應先後之不齊也壬水先來丁火後至則陽包陰而為女丁火先來壬水後至則陰包陽而為男易謂乾道成男坤道成女者以坤體而得乾爻則成男以乾體而得坤爻則成女非秉父氣則為男秉母氣則為女也生理皆同而情狀殊絶者氣秉之不均也靈樞通天分言五態之人太陰之人秉水氣也太陽之人秉火氣也少陰之人秉金氣也少陽之人秉木氣也陰陽和平之人秉土氣也陰陽二十五人備言五形之人是秉五氣之全者一氣又分左右左右又分上下五行各五是為二十五人生人之大凡也五行異氣情貌爰別而人之受氣又有偏完偏實之不一清濁厚薄之迥異因而性質運命高下霄壤推其原始總由祖氣而分祖氣不同故精神異其昏明氣血殊其滑澀五臟五官以及筋脈骨肉皮毛爪發胥有美惡之辨靈蠢壽夭富貴貧賤於此懸別所謂命稟於生初也人與天地同氣秉賦既異乃與天運之否泰無心而合此氣化自然之妙也祖氣秉於先天沖漠無形其通塞從違顯而可見者後天之氣也凡氣數之乖蹇雖機兆未形而其精神泄越見之夢寐氣血鬱濁蒸為蟣蝨蟲虯甚至色已明徵神且先告第昧者不知耳及其否極病生疾痛切身然後能覺此愚夫之恆情也太素以脈而談祿命深有至理而拘士非之以為窮通身外之事與血氣無關智淺鮮矣叔皮之論王命蕭遠之論運命及孝標辨命之作皆言天運而不言人理則亦知其略而未睹其原也藏象解太真剖判離而為兩各有專精是名陰陽清陽升天濁陰歸地升天成象降地成形清則氣化濁則質生素問陰陽應象論在天為玄在地為化玄生五神化生五味神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水五氣分治是為五行人與天地相參也感五行之氣而生臟腑焉五臟者肝心脾肺腎也六腑者膽胃大腸小腸三焦膀胱也臟五而腑六靈樞脹論膻中者心主之宮城也是為心包合為六臟臟為陰腑為陽陰陽相合則為表裡肝者將軍之官謀慮出焉肝合膽膽者中正之腑木也心者君主之官神明出焉心合小腸小腸者受盛之腑火也脾者倉廩之官五味出焉脾合胃胃者五穀之腑土也肺者相傅之官治節出焉肺合大腸大腸者傳道之腑金也腎者作強之官伎巧出焉腎合膀胱膀胱者津液之腑水也膻中者臣使之官喜樂出焉膻中合三焦三焦者決瀆之腑相火也三焦亦合於腎而別為孤腑以三焦水道所出腎為水臟故並領之靈樞本輸少陽屬腎腎上連肺故將兩臟三焦者中瀆之腑也水道出焉屬膀胱是孤之腑也肝位於東其氣風其志怒其音角其液泣其聲呼其色青其臭臊其味酸心位於南其氣熱其志喜其音徵其液汗其聲笑其色赤其臭焦其味苦脾位於中其氣濕其志思其音宮其液涎其聲歌其色黃其臭香其味甘肺位於西其氣燥其志悲其音商其液涕其聲哭其色白其臭腥其味辛腎位於北其氣寒其志恐其音羽其液唾其聲呻其色黑其臭腐其味鹹四十九難肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑心主臭自入為焦入脾為香入肺為腥入腎為腐入肝為臊脾主味自入為甘入肺為辛入腎為咸入肝為酸入心為苦肺主聲自入為哭入腎為呻入肝為呼入心為笑入脾為歌腎主液自入為唾入肝為泣入心為汗入脾為涎入肺為涕關尹子木茂故華為五色火飛故達為五臭土和故滋為五味金堅故實為五聲水潛故蘊為五精也肝氣司生其時應春其性為暄其化為榮其政為散其令宣發其變摧拉其合筋其榮爪也心氣司長其時應夏其性為暑其化為茂其政為明其令鬱蒸其變炎鑠其合脈其榮色也脾氣司化其時應長夏其性靜兼其化為盈其政為謐其令雲雨其變動注其合肉其榮唇也肺氣司收其時應秋其性為涼其化為斂其政為徑其令霧露其變肅殺其合皮其榮毛也腎氣司藏其時應冬其性為凜其化為肅其政為靜其令閉塞其變凝烈其合骨其榮發也五臟者所以藏精神魂魄者也靈樞本神肝藏血血舍魂心藏脈脈舍神脾藏營營舍意肺藏氣氣舍魄腎藏精精舍志五臟皆有神而藏之於心五臟皆有精而藏之於腎神為陽而精為陰土居陰陽之交魂者自陰而之陽陽盛則生神魄者自陽而之陰陰盛則生精血陰也而其中有陽得木氣之散則陽升而氣化氣陽也而其中有陰得金氣之收則陰降而質結蓋陰濁而有質陽清則有氣將結此質而質之魄先生將化此氣而氣之魂先見氣之虛靈者則為神質之靜凝者則為精神清而明精濁而暗古人以升魂為貴降魄為賤緣魂向陽而魄向陰也物生於春夏而死於秋冬人之大凡陽盛則壯陰盛則老及其死也神魂去而精魄存氣雖亡而質仍在也於此可悟陰陽之貴賤矣五行之理相生以氣非相生以質談子所謂形不靈而氣靈也地之木火土金水者五行之質也天之風熱濕燥寒者五行之氣也天氣盛於東南地氣盛於西北東南者生長之位西北者收藏之位陽主生長陰主收藏陽生於東而長於南陰收於西而藏於北陽之方生則為春三陽在上故春之氣溫既長則為夏六陽在上故夏之氣熱陰之方收則為秋三陰在上故秋之氣涼既藏則為冬六陰在上故冬之氣寒天氣一日而四周將寒則涼將熱則溫故寒生東方之溫溫生南方之熱熱生中央之濕濕生西方之涼涼生北方之寒其相生全是氣化非木之質生火火之質生土土之質生金金之質生水水之質生木也成質則不能生矣相剋者制其太過也木氣過散則土不堅故斂之以收氣火氣過炎則金不肅故聚之以藏氣土氣過濕則水不升故散之以風氣金氣過收則木不達故溫之以熱氣水氣過潤則火不降故燥之以土氣水升則火降火降則金肅金肅則木榮木榮則土燥土燥則水升相生則無不及相剋則無太過生則見變化之妙克則見制伏之巧亦克以氣而不克以質也前人據五行形質而論生克逝其遠矣尚書洪範木曰曲直金曰從革火曰炎上水曰潤下土爰稼穡此五行之性也曲直作酸炎上作苦從革作辛稼穡作甘潤下作咸此五行之味也蓋水宜浮而火宜沉木宜升而金宜降土居中皇是為四象轉運之機潤下者水氣之不浮也炎上者火氣之不沉也直則木升曲者木氣之不升也從則金降革者金氣之不降也甘者稼穡之正位平則不見不平則見甘味之見者土氣之不運也五氣堙郁而後五味以生五臟乃病升水木而降火金其權在土土氣不運則四維莫轉此五味郁生之原也善乎庚桑子之言草鬱則為腐樹鬱則為蠹人鬱則為病陽性動而陰性止動則運而止則鬱陽盛而生病者千百之一陰盛而生病者盡人皆是此凡物之大情也五臟開竅於五官子華子心之氣為離其神為朱鳥其竅通於舌腎之氣為坎其神為玄龜其竅通於耳肝之氣為震其神為蒼龍其竅通於目肺之氣為兌其神為伏虎其竅通於鼻脾之氣為戊己其神為鳳凰其竅通於口故肝心脾肺腎五臟之司目舌口鼻耳五官之候靈樞脈度五臟常內閲於上七竅也肝氣通於目肝和則目能辨五色矣心氣通於舌心和則舌能知五味矣脾氣通於口脾和則口能知五穀矣肺氣通於鼻肺和則鼻能知香臭矣腎氣通於耳腎和則耳能聞五音矣五臟陰也五官陽也陽升於陰陰降於陽頭上七竅位為純陽陰性重濁陽性清虛清虛之極神明出焉五神發露則開七竅七竅者神氣之所遊行而出入也壯則陽旺而神清濁陰沉降故七竅靈通老則陽衰而神散濁陰填湊故七竅晦塞六腑者所以受水穀而行化物者也水穀入胃脾氣消磨渣滓下傳精微上奉化為霧氣歸之於肺肺司氣而主皮毛將此霧氣由臟而經由經而絡由絡而播宣皮腠熏膚充身澤毛是謂六經之氣霧氣降灑化而為水津液精血於是生焉陰性親內自皮而絡自絡而經自經而歸趨臟腑津入於肺液入於心血入於肝精入於腎是謂五臟之精陽根於陰故生於內而盛於外陰根於陽故生於外而盛於內五臟之部心位於上腎位於下肝位於左肺位於右脾位於中穀氣為陽升於心肺穀精為陰入於腎肝腎為純陰陰極則陽生心為純陽陽極則陰生故上亦有精而下亦有氣下之氣陽之根也上之精陰之根也飲入於胃脾陽蒸動化為雲霧而上升於肺是為肺氣肺氣清降化而為水遊溢經絡表裡皆周天暑衣厚腠理開發則外泄而為汗天寒衣薄腠理閉塞則下行而為溺膀胱者水之壑也三焦之火隨膀胱太陽之經下行而司水道下焦之火祕則膀胱清利而水道通下焦之火泄則膀胱熱澀而水道閉火泄脾虛不能蒸水化氣則水穀並趨二腸而成泄利泄利之家膀胱熱澀而脾腎寒滑全因相火之泄陷也靈樞營衛生會上焦如霧中焦如漚下焦如瀆水性流下下焦之水獨盛故如瀆氣性親上上焦之氣獨盛故如霧中焦氣水之交故如漚譬之如釜火炎水沸上則熱氣之升騰霧也中則泡波之起滅漚也下則釜底之水瀆也列子屬天者清而散屬地者濁而聚腑稟天氣故泄而不藏臟稟地氣故藏而不泄五臟別論五臟者藏精氣而不泄也故滿而不能實六腑者傳化物而不藏也故實而不能滿陰陽互根五臟陰也而陽神藏焉非五臟之藏則陽神飛矣六腑陽也而陰精化焉非六腑之化則陰精竭矣蓋陰以吸陽故神不上脫陽以煦陰故精不下流陽盛之處而一陰已生陰盛之處而一陽已化故陽自至陰之位而升之使陰不下走陰自至陽之位而降之使陽不上越上下相包陰平陽祕是以難老陰在內陽之守也陽在外陰之衛也陰能守則陽祕於內陽能衛則陰固於外陽如珠玉陰如蚌璞含珠於蚌完玉以璞而昧者不知棄珠玉而珍蚌璞是之謂倒置之民矣經脈解六臟六腑是生十二經經氣內根於臟腑外絡於肢節其浮氣之不循經者為衛氣其精氣行於經者為營氣靈樞決氣壅遏營氣令無所避是謂脈臟脈為陰腑脈為陽脾腎肝膽胃膀胱經行於足是謂足之三陰三陽肺心心包三焦大腸小腸經行於手是謂手之三陰三陽脾肺之經太陰心腎之經少陰肝與心包之經厥陰膽與三焦之經少陽胃與大腸之經陽明膀胱小腸之經太陽太陽與少陰為表裡陽明與太陰為表裡少陽與厥陰為表裡手經與手配足經與足配經絡回環運行不息也靈樞經脈肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下行臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後循次指內廉出其端大腸手陽明之脈起於次指之端循指上廉出合谷兩骨之間上入兩筋之間循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上頰鼻孔胃足陽明之脈起於鼻之交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻從頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉入足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝骨內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側腎足少陰之脈起於小指之下斜趨足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中出名指之端三焦手少陽之脈起於名指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腑循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入名指之間其支者別跗上循大指歧骨內出其端還貫爪甲出三毛肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺此經脈之起止即營氣之行次也陽經在表陰經在裡太陽居外皮毛之分也次則陽明次則少陽次則太陰次則少陰次則厥陰近於骨矣陽經則屬腑絡臟陰經則屬臟絡腑足之陰經行於股里陽經行於股外手之陰經行於臂里陽經行於臂外陰經之次太陰在前厥陰在中少陰在後陽經之次陽明在前少陽在中太陽在後手之陰經自胸走手陽經自手走頭足之陽經自頭走足陰經自足走胸手三陽自手走頭足三陽自頭走足皆行於頸項而會於督之大椎頸脈之次任行於前督行於後俱在中央足陽明在任脈之次二次手陽明三次手太陽四次足少陽五次手少陽六次足太陽七次則項之中央下連脊骨督脈之部也在項之脈任督各一其餘左右各二合二十四經足經之部太陽少陰行身之背陽明太陰行身之前少陽厥陰行身之側除足太陽外陰陽皆會於宗筋手經悉行於手惟手少陽並足太陽而下行出膕中貫踹腸而入外踝臟腑之募皆在前散見諸脈而俞則在後發於太陽之一經以人身前陰而後陽故太陽為諸陽之主臟腑之陽以類相從而發見於背膂也手之陽經則升陰經則降足之陽經則降陰經則升手之三陽陽中之太陽也皆升手之三陰陽中之少陰也皆降足之三陽陰中之少陽也皆降足之三陰陰中之太陰也皆升蓋手足陰陽濁中之清者則從下而升清中之濁者則從上而降太陰陽明論陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足陽病者上行極而下陰病者下行極而上以陰極則陽生陽極則陰生凡物之理窮則反終則始也陽受氣於四末故四肢為諸陽之本然陽升於手而降於足陰升於足而降於手升為初氣降為終氣則陽盛於手而陰盛於足故手巧而足拙以陽性輕捷而陰性遲重故也五臟開竅於五官清陽由經脈而升也經脈之中清者升而濁者降靈樞陰陽清濁其清者上走空竅濁者下行諸經清氣升則孔竅靈故能辨聲色別臭味陽性熱陰性寒陰陽平者下反溫而上反清以陽降而化濁陰陰升而化清陽故也手足之經陰陽各三是謂六氣手少陰以君火主令足少陰水也從妻化氣而為熱足太陽以寒水主令手太陽火也從夫化氣而為寒足厥陰以風木主令手厥陰火也從母化氣而為風手少陽以相火主令足少陽木也從子化氣而為暑足太陰以濕土主令手太陰金也從母化氣而為濕手陽明以燥金主令足陽明土也從子化氣而為燥經別者正經之別行者也營於脈中直道而行則為正內則臟腑表裡之經相為絡屬及本經之支派他交者則為別詳見靈樞經別經筋者十二經之筋也起於各經分道而行所行之道多與經脈相同獨足之三陰始同終異而其結聚則在四肢溪谷之間以諸筋皆屬於節也肝主筋而榮爪故十二經筋皆始自爪甲而結於腕踝聚於肘膝會於肩髀聯屬肌肉維絡頸項裹纈頭面大筋為綱小筋為維陽筋則剛陰筋則柔約束百骸而會於宗筋故痿論宗筋主束骨而利機關也詳見靈樞經筋奇經者督任沖帶陽蹺陰蹺陽維陰維也二十八難督脈者起於下極之俞並於脊裡上至風府入屬於腦任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目絡舌衝脈者起於氣衝並足陽明之經挾臍而上至胸中而散帶脈者起於季脅回身一周陽蹺者起於跟中循外踝上行入風池陰蹺者亦起於跟中循內踝上行至喉嚨交貫衝脈陽維陰維者維絡於身陽維起於諸陽會陰維起於諸陰交也凡此八脈者經脈之絡也經盛則入絡絡脈滿溢不拘於經內溉臟腑外濡腠理譬之聖人圖設溝渠通利水道天雨降下溝渠滿溢雱霈妄行流於深湖聖人不能復圖也經脈隆盛入於八脈而不環周故八脈溢蓄別道自行諸經不能復拘也任督沖三脈一源同起於會陰督則循背而行身後為諸陽之綱任則循腹而行身前為諸陰之領沖則挾臍上行為諸經之海督行於後而亦行於前骨空論督脈起於少腹以下骨中央入系廷孔其孔溺孔之端也其絡循陰器合纂間別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於自內眥上額交巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央是督脈之前行也蓋任督本一脈以前後而異名耳沖行於上而亦行於下靈樞動輸衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉斜入膕中循京骨內廉並少陰之經下入內踝之後入足下其別者斜入踝出屬跗上入大指之間注諸絡以溫足脛是衝脈之下行也陽蹺陽維者足太陽之別陰蹺陰維者足少陰之別陽蹺主左右之陽陰蹺主左右之陰陽維主一身之表陰維主一身之裡帶則橫束一身之脈者也別絡者諸經別出之大絡也靈樞經別手太陰之別名曰列缺起於腕上分間並太陰經直入掌散入於魚際手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰遍齒其別者入耳合於宗脈手少陽之別名曰外關去腕二寸外繞臂注胸中合心主足太陽之別名曰飛揚去踝七寸別走少陰足少陰之別名曰光明去踝五寸別走厥陰下絡足跗足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛上睪結於莖任脈之別名曰尾翳下鳩尾散於腹督脈之別名曰長強挾膂散頭上下當肩胛左右別走太陽入貫膂脾之大絡名曰大包出淵液下三寸布胸脅此十五絡也素問平人氣象論胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣宗脈氣也此又胃之一大絡也諸經之絡各一而脾胃之絡則二以脾胃者諸經之本故也經脈為里支而橫者為絡絡之別者為孫孫絡三百六十五此外絲分而縷析焉巧曆不能得矣經脈十二左右二十四奇經八脈左右十四別絡十六左右三十共六十八脈相隨而上下陰脈營其臟陽脈營其腑區處條別不相紊亂已營衛解人受氣於谷谷入於胃以傳於肺精華氤氳而生氣血其清者為營濁者為衛營行脈中衛行脈外一日一夜周身五十脈中之血其名曰營血中之氣是曰營氣營氣在脈隨宗氣而行穀精之化營氣其大氣之摶而不行者積於胸中命曰宗氣宗氣者所以貫心肺而行呼吸營氣之行一息往來蓋血之動氣鼓之也人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息脈六動一動脈行一寸六動脈行六寸靈樞脈度手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也平人一日一夜一萬三千五百息上下左右前後二十八脈以應二十八宿周天二十八宿宿三十六分一日之度一千八分漏水下百刻以分晝夜每刻一百三十五息一息氣行六寸十息氣行六尺一百三十五息人氣半周於身脈行八丈一尺下水一刻日行十分二百七十息氣行十六丈二尺是謂一周下水二刻日行二十分五百四十息人氣再周於身脈行三十二丈四尺下水四刻日行四十分二千七百息人氣十周於身脈行一百六十二丈下水二十刻日行五宿二十分一萬三千五百息人氣五十營於身脈行八百一十丈水下百刻日行二十八宿一千八分營氣之行常於平旦寅時從手太陰之寸口始以肺主氣而朝百脈也自手之太陰陽明注足之陽明太陰手之少陰太陽注足之太陽少陰手之厥陰少陽注足之少陽厥陰即經脈之行次也終於兩蹻督任周而復始陰陽相貫如環無端晝夜五十周畢明日寅時又會於氣口此營氣之度也衛氣者不隨營氣而自行於脈外晝行陽經二十五周夜行陰臟二十五周其行於陽也常於平旦寅時從足太陽之睛明始睛明者目之內眥靈樞衛氣平旦陰晝陽氣出於目目張則氣上行於頭循項下足太陽至小指之端其散者別於目內眥下手太陽至小指之端其散者別於目鋭眥下足少陽至小指次指之端以上循手少陽之分側下至名指之端別者至耳前合於頷脈注足陽明下至跗上入中指之端其散者從耳下下手陽明入次指之端其至於足也入足心出內踝下足少陰陰蹻者足少陰之別屬於目內眥自陰蹻而復合於目交於足太陽之睛明是謂一周歲有十二月日有十二辰子午為經卯酉為緯日行二十八宿而一面七星四七二十八星房昴為緯虛張為經房至畢為陽昴至心為陰陽主晝陰主夜夜半為陰曨雞鳴而陰衰平旦陰盡而陽受氣矣日中為陽曨日西而陽衰日入陽盡而陰受氣矣太陰主內太陽主外衛氣至陽而起至陰而止各行二十五度分為晝夜日行一舍人氣行一周於身與十分身之八日行二舍人氣行三周於身與十分身之六日行三舍人氣行五周於身與十分身之四日行四舍人氣行七周於身與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周與十分身之六日行十四舍人氣二十五周於身與十分之身之二陽盡於陰陰受氣矣其入於陰也常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周夜行一舍人氣行於陰臟一周與十分臟之八夜行十四舍人氣行於陰臟二十五周與十分臟之二從腎至少陰之經而復合於目陰陽一日一夜各行二十五周而有奇分在身得十分身之二在臟得十分臟之二合得十分之四從房至畢十四舍水下五十刻日行半度衛氣出於陽則寤從昴至心十四舍水下五十刻衛氣入於陰則寐人之所以臥起之時有早晏者奇分不盡數也此衛氣之度也三十難言營衛相隨蓋相隨之義如日月之度雖不同道而並行不悖也營自起於宗氣衛自起於睛明營則陰陽相間衛則夜陰晝陽起止不同道路各異非同行於一經之謂也臟候解人秉五氣是生臟腑受氣不同臟腑亦別強弱殊質邪正異性感而生病千變不一臟腑幽深人不能見而相形察色可以外候也靈樞本臟臟腑者所以參天地而副陰陽運四時而化五節五臟固有小大高下堅脆端正偏傾六腑亦有小大長短厚薄結直緩急吉凶善惡之殊由此分焉心小則臟安邪弗能傷易傷以憂大則憂不能傷易傷於邪高則滿於肺中俯而善忘難開以言下則易傷於寒易恐於言堅則臟安守固脆則善病消疸熱中端正則和利難傷偏傾則操持不一無守司也肺小則臟安少飲不病喘喝大則多飲善病胸痹喉痹逆氣高則上氣肩息咳下則居賁迫肝善脅下痛堅則不病咳上氣脆則善病消疸易傷端正則和利難傷偏傾則胸偏痛也肝小則臟安無脅下之病大則逼胃迫咽苦膈中且脅下痛高則上支賁切脅悗為息賁下則逼胃脅下空而易受邪堅則臟安難傷脆則善病消疸易傷端正則和利難傷偏傾則脅下痛也脾小則臟安難傷於邪大則苦湊䏚而痛不能疾行高則䏚引季脅而痛下則下加於大腸而臟苦受邪堅則臟安難傷脆則善病消疸易傷端正則和利難傷偏傾則善滿善脹也腎小則臟安難傷大則善病腰痛不可以俯仰易傷以邪高則苦背膂痛不可以俯仰下則腰尻痛不可以俯仰為狐疝堅則不病腰背痛脆則善病消疸易傷端正則和利難傷偏傾則苦腰尻痛也凡此二十五變者人之所以強弱不同也赤色小理者心小粗理者心大無𩩲𩨗者心高𩩲𩨗小短舉者心下𩩲𩨗長者心下堅𩩲𩨗弱小以薄者心脆𩩲𩨗直下不舉者心端正𩩲𩨗倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也青色小理者肝小粗理者肝大廣膺反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏傾者腎偏傾也五臟皆小者少病苦焦心大愁憂皆大者緩於事難使以憂皆高者好高舉措皆下者好出人下皆堅者無病皆脆不離於病皆端正者和利得人心皆偏傾者邪心而善盜不可以為人平反覆言語也六腑之應肺合大腸大腸者皮其應也心合小腸小腸者脈其應也肝合膽膽者筋其應也脾合胃胃者肉其應也腎合三焦膀胱三焦膀胱者腠理毫毛其應也肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裹大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結也心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結也脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下管約不利肉䐃不堅者胃緩肉䐃無小理纍者胃急肉䐃多小理纍者胃結胃結者上脘約不利也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡青黑多紋者膽結也腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無豪毛者三焦膀胱急豪毛美而粗者三焦膀胱直稀豪毛者三焦膀胱結也靈樞師傳五臟者心為之主缺盆為之道骷骨有餘以候𩩲𩨗肺為之蓋巨肩陷喉候見其外肝者主為將使之候外欲知堅脆視目小大脾者主為衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性六腑者胃為之海廣額大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下裹大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此五臟六腑之外候也凡官骸美惡胥稟臟氣生死壽夭不外乎此靈樞五色明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也五官之位其間欲方大去之十步皆見於外如是者壽必中百歲故五官以辨闕庭以張明堂廣大蕃蔽見外方壁高基引垂居外壽考之徵也若五官不辨闕庭不張小其明堂蕃蔽不見又卑牆基牆下無基垂角去外如是者雖平常殆加之以疾百不一生也靈樞天年五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能長久使道隧以長牆基高以方通調營衛三部三里起骨高肉滿百歲乃得終五臟不堅使道不長空外以張喘息暴疾又卑牆基薄脈少血其肉不石故中壽而盡也靈樞壽夭剛柔形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭形充而皮膚緩者則壽急者則夭形充而顴不起者骨小骨小則夭形充而䐃肉堅者肉堅肉堅則壽䐃肉不堅者肉脆肉脆則夭牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣此即官骸以測壽夭之法也經脈十二根於臟腑而一身毛髮又秉經氣而生觀之可以知血氣之盛少焉靈樞陰陽二十五人足三陽之上者皆行於頭陽明之經其榮髯也少陽之經其榮須也太陽之經其榮眉也血氣盛則美而長血氣少則惡而短三經之下者皆循陰器而行於足陽明之血氣盛則下毛美長血氣少則無毛足指少肉而善寒少陽之血氣盛則脛毛美長外踝毛堅而厚太陽之血氣盛則跟肉滿而踵堅血氣少則跟瘦而善轉筋手三陽之上者亦行於頭陽明之經其榮髭也少陽之經其榮眉也太陽之經其榮須也血氣盛則美而長血氣少則惡而短三經之下者皆循臂臑而行於手血氣盛則掌肉充滿而溫血氣少則掌瘦以寒陽明之血氣盛則腋下之毛美少陽之血氣少則手瘦而多脈知皮毛則知經脈知經脈則知臟腑表裡一氣內外合符察微洞幽不逾跡象此亦精義入神之事也
