body:
  text: 卷四消渴解吳智淵病消渴胸膈燥熱如焚日飲涼水石余溲亦石余溲下溫熱將畢則寒其色白濁魄門失氣亦涼天寒腿膝頗冷善食善飢數倍其常此緣濕土遏抑風木疏泄心火本熱腎水本寒平人火不上熱水不下寒者以水根於火火根於水也水根於火則九天之上陽極陰生常肅然而如秋火根於水則九地之下陰極陽化常煦然而如春蓋陽降而化濁陰又含陽氣陰升而化清陽又抱陰精此水火交濟之常也陰陽之升降必由左右左右者陰陽之道路也右為肺金左為肝木金不右降則火逆而生上熱木不左升則水陷而生下寒下寒則肝木鬱泄而善溲上熱則肺金枯燥而善飲而消渴之病則獨責肝木而不責肺金仲景傷寒金匱厥陰之為病消渴以厥陰風木生於癸水而長於己土水寒土濕生長不遂木鬱風動疏泄失藏則善溲溺風燥亡津肺金不澤則善消渴溲溺不止者乙木之陷也消渴不已者甲木之逆也甲木化氣於相火與手少陽三焦並歸癸水而約小便靈樞本輸三焦者入絡膀胱約下焦實則閉癃虛則遺溺手足少陽祕藏癸水之中則下不淋遺而上無消渴癸水不藏甲木上逆則相火升炎而病消渴三焦下陷則相火淪落而病淋遺蓋膀胱者州都之官津液藏焉三焦者決瀆之官水道出焉膀胱主藏三焦主出水善藏而火善泄其性然也三焦之火祕於腎臟則臟溫而腑清三焦之火泄於膀胱則臟寒而腑熱腑清則水利腑熱則溺癃而三焦之火不無盛衰其火盛而陷者則水腑熱澀其火衰而陷者則水腑寒滑熱澀者實則閉癃也寒滑者虛則遺溺也膀胱寒滑藏氣失政故多溲溺甲木之逆三焦之陷則皆乙木泄之也是以獨責之厥陰而乙木之泄則由太陰之濕陷陽明之燥逆也陰陽別論二陽結謂之消二陽者手足陽明手陽明以燥金主令足陽明從令而化燥足太陰以濕土主令手太陰化氣而為濕濕濟其燥則肺胃清降而上不過飲燥濟其濕則肝脾溫升而下不多溲陽明燥結於上脘故相火燔蒸而善渴太陰濕鬱於下脘故風木疏泄而善溺金匱男子消渴飲水一斗小便一斗者腎氣丸主之相火在水是為腎氣附子補腎中陽根召攝相火相火蟄藏則渴止而逆收此反本還原之法也地黃丹皮清乙木而潤風燥澤瀉茯苓滲己土而退濕淫桂枝達肝脾之遏陷薯蕷茱萸斂精溺之輸泄附子溫腎水之寒制方精良豪無缺缺矣然陰陽有進退燥濕有消長此非盡陽明之病也消渴而水利者燥多而濕少當屬之陽明消渴而溺癃者濕多而燥少宜屬之太陰以土濕非旺則風木疏泄而不藏是以水利土濕過甚則風木疏泄而不通是以溺癃二陽結謂之消是陽明燥盛而水利者也二陽之病發心脾有不得隱曲女子不月其傳為風消是太陰濕盛而溺癃者也蓋乙木藏血而孕丁火脾土濕陷木鬱風生必病消渴血中溫氣化火之根溫氣抑遏子母感應心火必炎相火者君火之佐君相同氣有感必應其勢如此病起二陽而究歸心脾者太陰之濕盛也心火上炎熱甚津亡故常燥渴脾土下陷濕旺木鬱故少溲溺肝主筋前陰者筋之聚其在男子則宗筋短縮隱曲不利其在女子出經血瘀澀月事不來總由風木盤塞而莫能泄也如此則宜減地黃而增丹皮去附子而加芍藥緣木鬱不泄溫氣陷而生下熱膀胱熱癃則宜芍藥經脈閉結營血不流則宜丹皮去附子之助熱減地黃之滋濕藥隨病變無容膠執也金匱以八味治小便不利是無下熱者後世庸工或以承氣瀉火或以六味補水或以四物滋陰述作相承千秋一例而金匱立法昭若日星何其若罔聞知也至喻嘉言解金匱消渴厥陰為病一條以為後人從傷寒採入其於傷寒金匱一絲不解是又庸醫之下者矣嘉言謂傷寒熱深厥深與雜證不同是襲傳經為熱之說不通極矣又以下消為熱更謬經義淵微固屬難解仲景八味之法與岐伯二陽結義同符特庸工不悟耳智淵病用腎氣丸料煎湯冷飲覆杯渴止積年之苦遂除氣鼓解田龍章初秋病痢服藥數劑痢愈而腹脹得食更甚脅內氣衝作痛用溫中散滯之方脹消心緒煩亂悅怒不平又以忿恚而發數發之後臍內腫脹遂成氣鼓喘呼不臥溲溺艱澀諸味俱絶食甘稍差此緣脾土濕陷木鬱不達腎司二便而糞溺之輸泄其職在肝陽衰土濕脾氣鬱陷抑遏乙木升發之氣下衝魄門泄其積鬱而傳道阻梗是以病痢過服寒泄傷其脾陽痢止土敗不能升運木氣猶遏故多忿怒怒傷肝氣賊虛脾土肝脾郁迫不得發舒故清氣壅阻而為腫脹脾主消磨肝主疏泄飲食入胃脾陽升磨穀精上運則化氣血谷滓下傳則為大便而水之消化全賴土燥克以燥土蒸而為氣霧氣降灑化而為水以輸膀胱糞溺蓄積泄以風木之氣水利於前谷行於後則後不至泄而前不至淋水利土燥脾升木達清陽旋轉腫脹所以不作也土濕不能蒸水化氣乃與谷滓併入二腸水停濕旺土陷木鬱木氣衝決但沖二腸而為泄利不開膀胱而導閉癃是以後竅滑而前竅澀前竅不開濕無去路肝脾日郁此腫脹所由作也肺主氣而行水脾氣陷塞胃無下行之路則肺金逆上不能下降而為水霧氣堙郁故生痰喘氣位於上水位於下上不病氣鼓下不病水脹者氣水各得其位也惟水逆於上則病水脹氣陷於下則病氣鼓金匱腰以上腫當發其汗腰以下腫當利其小便發其汗者使積水化氣泄於汗孔利其小便者使積氣化水泄於膀胱也膀胱通塞司於三焦三焦之火隨太陽下行溫腎水而約膀胱虛則遺溺而不藏實則閉澀而不通所謂實者三焦之火陷於膀胱也火陷於膀胱者肝脾之不升也肝木下陷鬱而生熱傳於脾土土木合邪傳於膀胱膀胱瘀熱故小便淋澀黃赤黃者土色之下行赤者火色之下現腎主蟄藏三焦之火祕於腎臟腎水暖則上生肝木木之溫者秉於水中之火也肝木溫升則化心火肝木不升溫氣遏陷故生下熱溫氣下陷生意不遂而愈欲疏泄故相火失藏此宜燥土升陷而達木氣土燥陽升消化水穀水能化氣而氣復化水下注膀胱水道清利濕氣滲泄肝脾升達腫脹自消庸工見其小便熱澀而以黃柏知母清瀉膀胱之熱脾陽更敗濕陷益增是拯溺而投之以石也豈不謬與若臟腑之中濕旺氣結久而不行化生腐敗腐敗瘀填則用疏滌五臟之法去其菀陳腐敗全消脾陽升布則精氣動薄神化回潏壽命永固長生不老此除舊布新之法也人生於火而死於水以陽生而陰殺也土者火之子而水之夫所以制水而救火太陰濕土雖名剋水而濕性易發輒為水侮故仲景立方第有泄濕之論而無補水之條至劉朱二家專事瀉火而鼓脹一門亦謂濕熱不知濕熱之原何由而成此井蛙夏蟲之見耳薛氏加減腎氣之法地黃滋其土濕牛膝陷其脾陽附子不能補水中之火反以益肝膽膀胱之熱服之病輕者效病重者死非氣鼓之良法也其減地黃附子增車前而倍茯苓亦恐其滋濕而生熱而不知為濕熱之媒譬猶遺蓋而逃雨也無之而非濕矣庸工見八味助火改事寒涼殺人更捷此劉朱之遺禍至今不息良可悲夫龍章病用燥土達木行郁升陷之味十餘日全瘳噎膈解李玉林因積忿病膈喉緊胸痞飲食艱阻焦物稍下右脅脹痛腹滿氣逆環臍痛楚酸水泛溢日嘔膠痰得酒更多便乾完穀不化病將半年日月增劇醫教以多飲牛乳或欲以甘遂下痰遲疑未服此緣肝脾濕陷肺胃壅阻人之中氣左旋而化脾土右轉而化胃土中氣健旺陰陽不偏則胃氣下行濁陰右降清虛而善容脾氣上行清陽左升溫暖而善消樞軸運動水穀消磨精華上奉渣滓下傳舊谷既腐新谷又至氣化循環倉稟常開所以不病噎膈也中氣在陰陽之交水火之分不燥不濕不熱不寒脾升則陽氣發生而化溫胃降則陰氣收斂而化燥清陽化火乃為熱濁陰化水乃為寒然則坎離之本是在戊己戊己之原實歸中氣中年以外戊土之陰漸長己土之陽漸消往往濕增而燥減水旺而火衰寒水勝火入土化濕水寒則乙木不生土濕則肝氣不達重以積怒傷肝克賊脾土肝脾郁陷水穀不消則肺胃痞升飲食不納相因之理也肺位於胸膽位於脅皆隨胃土下行胃氣上逆肺膽無下行之路食下而肺膽愈壅故胸痞而脅脹背者胸之府肺氣壅遏胸膈莫容逆沖肩背故肩胛之痛生焉痰飲者土金濕旺霧氣堙郁所化飲食入胃水穀之消磨賴乎脾陽精華之灑陳賴乎肺氣飲食腐化遊溢精氣上輸於脾脾氣散精上歸於肺肺氣飄揚氤氳布濩所謂上焦如霧者也肺氣清肅將此水穀精華宣布於毛脈臟腑之中化為津液精血所謂上焦開發宣五穀味熏膚充身澤毛若霧露之溉者是也足太陰以濕土主令手太陰從濕土化氣燥衰濕旺木鬱金革水穀在脾而消磨不速精華入肺而灑陳不利則氣滯津凝淫泆而化痰涎肺胃上逆濁氣填塞益以痰涎瘀阻膠黏不下此噎膈所由來也肺與大腸表裡同氣肺氣化津滋灌大腸則腸滑而便易飲食消腐其權在脾糞溺疏泄其職在肝以肝性發揚而渣滓盈滿礙其布舒之氣則沖決二陰行其疏泄催以風力故傳送無阻脾土濕陷風木不達疏泄之令弗行則陰氣凝塞腸竅全閉關隘阻隔傳道維艱而飲食有限糟粕無多不能沖關破隘順行而下零星斷落不相聯接大腸以燥金之腑而津液上凝不復下潤故糞粒乾燥梗澀難下膀胱者津液之腑津液之源化於肺氣氣滯痰結不獲化生津液下注膀胱故水道枯竭小便不利陰陽別論三陽結謂之膈三陽者太陽也足太陽膀胱結則小便癃手太陽小腸結則大便閉前後閉癃濁氣不能下泄因而上逆濁氣衝逆上脘痞塞是以食阻而不納肝脾升達則下竅疏通而善出肺胃降斂則上竅空洞而善入脾陷胃逆升降顛倒則上下不開出納俱廢病在飲食便溺之間而總以中脘之陽虛也朱丹溪以下愚談醫於噎膈一門首開滋潤之法陽虛濕旺再以牛羊乳酪敗脾陽而助土濕無不死者趙氏醫貫更扇其虐乃以六味補陰呂用晦讚揚而刻行之致使群愚誦習毒流天下後世可勝嘆哉丹溪論病悉歸於痰不知痰飲化生全因土敗濕滋乃於噎膈痰多竟以為燥此狂夫之下者是後醫書皆襲其訛以為陰虧燥甚遂使病者多死此自中古以來庸流立法之誤並非不起之證也玉林病用燥土行郁升陷降逆溫胃滑腸之法十餘日後二便皆通逆氣悉下飲啖如常反胃解林氏怒後胸膈熱痛吐血煩悶多痰頭疼作嘔因成反胃頭面四肢浮腫肌骨漸瘦常下紫血夏月心痛恆作腹中三塊如石一在左脅一在右脅一在心下痛時三塊上衝痞滿噯濁心煩口渴旋飲旋吐手足厥冷如冰交秋則愈經來腹痛遍身皮肉筋骨皆痛上熱燔蒸初病因喪愛子痛哭淚盡血流後遭父姑之喪凡哭皆血魚肉瓜果概不敢食恃粥而已粥下至胸即上時而吐蛔少腹結塞喘息不通小便紅濁淋澀糞若羊矢半月以後嗽喘驚悸不寐閣眼欲睡身跳尺余醒夢汗流往來寒熱凡心緒不快及目眶青黑則病發必劇病九年矣滴水弗存粒米不納服藥湯丸俱吐此緣脾陷胃逆出納皆阻胃主降濁脾主升清脾升則清氣上達糞溺無阻胃降則濁氣下傳飲食不嘔脾陷而清氣填塞是以澀閉胃逆而濁氣衝逆是以湧吐而出納廢棄上下關格總由中脘陽虛脾胃濕寒不能消水而化谷蓋水穀消化糟粕下傳胃無陳宿故不嘔也即嘔亦無物脾胃濕寒水穀不消陳宿停留壅礙陽明虛受之常則中脘郁脹升降例行胃氣上逆故嘔吐不存也胃以下行為順上行為反上行之久習為自然食停即吐永不順降故曰胃反飲食不存無復渣滓入於二便而肝脾鬱結腸竅塞閉是以便溺不利胃氣上逆肺膽莫降相火刑金故上熱鬱蒸嗽喘燥渴辛金不收則氣滯而痰凝甲木失藏則膽虛而驚作相火升炎泄而不祕皮毛開滑斯常汗流神氣浮動自少夢寐六月濕旺胃氣更逆愈阻膽經降路甲木鬱迫賊傷胃氣則胃口疼痛少陽經脈自胃口而下兩脅經腑俱逆不得舒布兩氣摶塞因成三塊甲木升擊則三塊齊沖土木糾纏故痞塞噯氣交秋燥動濕收是以病愈也血藏於肝而斂於肺陰分之血肝氣升之故不下脫陽分之血肺氣斂之故不上溢血以陰體而含陽氣溫則升清則降熱則上流寒則下泄下溫而上清則條達而紅鮮上熱而下寒則瘀凝而紫黑凝瘀之久蓄積莫容乃病外亡相火升泄上熱下寒陽分之血已從上溢陰分之血必從下脫經脈敗漏紫黑不鮮一月數來或半月方止者血海寒陷而不升也經血寒瘀月期滿盈阻礙風木發舒之氣鬱勃衝突是以腹痛既不上達則必下泄而木氣遏陷疏泄不暢是以血下而梗澀也劉朱論血以紫黑為熱謬矣肝藏血而竅於目腎主五液入肝為淚肝氣上通於心靈樞口問心者五臟六腑之主也目者宗脈之所聚上液之道也悲哀憂愁則心動心動則五臟六腑皆搖搖則宗脈感而液道開故泣出焉悲哀動中肝液上湧營血感應宗脈開張木火升泄而金水不能斂藏是以血淚俱下也肝脾郁陷下焦堵塞故少腹結硬喘息不通肝屬木其色青其志怒其竅為目靈樞五閲五使肝病者眥青肝病則鬱怒而克脾土故青色見於目眥目眶青則病重者木賊而土敗也木鬱則生蟲肝鬱則生蛔故傷寒厥陰有吐蛔之條亦由土濕而木遏也脾主肌肉四肢之本濕旺脾郁肌肉壅滯而四肢失秉故生腫脹經後血脫溫氣亡泄脾陽愈敗故腫脹愈加也土虧陽敗病重邪深幸以下竅結澀陽根未斷是以久病長危而不死也林氏久病幾於絶粒用燥土暖水溫胃降逆疏木行郁之法川椒附子乾薑茯苓甘草桂枝白芍丹皮半夏蓯蓉半月愈中風解馬孝和素以生計憂勞因怒中風左手足卷屈寒冷如冰遍身骨痛惟左半無覺夜煩譫語不寐能食不能飲飲則氣逆欲吐胸悶痰多大便燥結小便痛澀肌色皯黣精神惶惑遇親故慰問泣下沾衣此緣水寒土濕木鬱風生肝位於左其志為怒其氣為風子華子西方陰止以收而生燥東方陽動以散而生風觀之於天大塊之噫氣必自春發推之於人人生之息吹必自肝生厥陰風木之氣天人所同也而土燥水暖則風生不烈以木生於水而長於土水暖則生髮滋榮土燥則長育條暢和風舒布必無飄忽激揚之災水寒土濕生長不遂木鬱風發極力疏泄乃有播土揚沙摧枯拉朽諸變木性疏泄水性蟄藏使陽根未斷藏氣稍存雖風木飄揚不至盡泄子華子水陽也而其伏為陰風陰也而其發為陽陽根不至升泄於風木者全賴腎陰之能伏耳今土濕水寒陽根欲絶風木鬱飄腎精不藏值怒動肝氣飄風勃發益以感冒虛邪束其皮毛裡氣郁遏愈增激烈風力簸扇津液消亡則筋脈攣縮而病偏枯此病生於內而非中八風之虛邪不能傷也腎藏精而主骨肝藏血而主筋風燥亡陰精血枯槁筋骨失養故卷屈疼痛左手足者風木之位是以偏傷肝血既耗則陽明與衝脈之血必不充足陽明多氣多血之經主潤宗筋宗筋主束骨而利機關衝脈者經脈之海主滲灌溪谷與陽明合於宗筋肘膝者溪谷之會機關之室陽明衝脈經血枯燥溪谷焦涸故機關不利肝心子母之臟肝氣傳心母病纍子心液亡而神明亂故煩躁譫語風木疏泄陽氣不斂君相升浮故不能寐夜半陰隆陽泄而不藏故中夜病劇也大小便者膀胱大腸之腑開竅於腎而輸泄之權則在於肝風動血虧輸泄不暢故便乾而溺澀也腿膝厥冷之證屬在厥陰陰性寒而陽性熱平人陰陽交濟則上不熱而下不寒厥陰陰極陽生水為母而火為子受母氣於北地所以下寒胎子氣於南天所以上熱陽上陰下不相交接故厥陰經病獨有厥證上下者陰陽之定位也左右者陰陽之道路也風木未極疏泄則火炎於子宮水沍於母位上下之寒熱不至易地風木大發掃地無餘陽根盡亡溫氣全泄乙木之溫奪於癸水之寒變東方陽和之地為北邊冰雪之場是以左半手足寒涼而無覺也肺屬金其氣燥其志悲其聲哭風傷津液燥動悲生觸緒哀感其性如此也總以寒水泛濫入土生濕木鬱風作筋脈失榮脾者孤臟以灌四旁濕旺津瘀不能四灌故內愈濕而外益燥一旦因情志之內傷虛邪外襲風燥血爍筋攣體枯以風木而刑濕土濕氣堙郁化生敗濁孔竅填塞肺腑鬱悶胃逆則神迷脾陷則言拙是皆中氣之敗也湯入則吐者滋其土濕胃氣愈逆也法當暖水燥土而潤風木水暖土燥乙木榮達風靜體伸復其骨健筋柔之素矣中風證時醫知有外邪不知有內傷全用辛溫發散誤矣又或用硝黃下藥是速其死病理微妙非近代粗工所知如劉河間李東垣朱丹溪輩曷能解此張景嶽愚而妄作又創為非風之論是敢與岐黃仲景為敵也又與氣脫之證相提並論尤屬愚昧氣脫者昏迷顛仆朝病夕死中風偏枯痿廢猶延數年之命久病方死安可混言風者百病之長外感悉同而病象懸殊以人之本氣不一也中風水寒土濕木鬱風搖外襲風淫表裡皆病初無西北東南真假之殊前人之論一字不通無足多辨者孝和病用暖水燥土滋木清風之法十餘劑擁杖而起放杖而笑不知病之去也呂氏春秋魯人有公孫悼者謂人曰吾能起死人吾故能治偏枯今吾倍所以治偏枯之藥則能起死人矣公孫悼雖不能起死人然未嘗不善治偏枯後之醫者倍死人之藥以起偏枯良可嘆息也帶下解李氏夏病赤帶內雜白沙如豆並下紫血食不甘味入口作苦咽乾胸燥思飲而內實不渴大便泄利小便淋濁溺前作痛溺後作癢此緣脾土濕陷風木疏泄精藏於腎其性封蟄而腎水蟄封由於肺金之收斂收則生燥手陽明以燥金主令足陽明從燥金化氣戊土燥降收斂得政陽蟄九地之下則癸水溫暖而不泄陽明之燥奪於太陰之濕則戊土不降肺金失收斂之令相火升泄於是癸水莫藏腎主蟄藏肝主疏泄己土濕陷抑遏乙木生髮之氣鬱怒生風竭力疏泄木能疏泄而水不蟄藏其在男子則病遺精其在女子則病帶下靈樞五癃津液陰陽不和即水火不交則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸即遺精帶下之證也女子帶下精液流溢五色不同上古天真論腎者主水受五臟六腑之精而藏之腎水失藏五臟陷流一臟偏傷則一色偏下肝青心赤脾黃肺白腎黑各有本色是以不一也風木鬱泄相火不祕甲木之火逆則胸膈煩熱三焦之火陷則膀胱熱澀風力郁沖而木氣遏陷不能暢泄故溲溺淋漓梗阻難下木以疏泄為性水道不開勢必後沖穀道以泄怫鬱水穀齊下則成泄利水曰潤下潤下作咸水之潤下莫過於海故海水獨咸一經火煎日曬則結咸塊白沙成粒者相火陷於膀胱煎熬溲溺而結與煮海成鹽之義正相同膀胱熱癃精溺蹇塞木氣鬱礙是以作痛精溺既下而木鬱未達是以發癢風木陷泄肝血失藏離經瘀郁久而腐敗故紫黑時下其病於夏暑者濕旺木鬱非關熱盛秋涼則愈者燥動而濕收也然木鬱熱作是病之標而火泄水寒是病之本推其源流則由奇經之任帶二脈骨空論任脈為病男子內結七疝女子帶下瘕聚任為諸陰之長水寒血冷任脈凝沍陰氣摶結則為疝瘕陰精流注則為帶下無二理也帶脈起於季脅回身一周居中焦之位處上下之間橫束諸脈環腰如帶所以使陽不上溢陰不下泄土敗濕滋帶脈不束督升任降陽飛陰走故精液淫溢而不收也金匱婦人病下利數十日不止暮即發熱少腹裡急手掌煩熱唇口乾燥此病屬帶下曾經半産瘀血在少腹不去以瘀血凝結阻水火升降之路則火逆而生熱煩水陷而為帶下此帶證發作之因也此當溫燥脾腎疏木達郁以榮風木後之庸醫或用清利或事固澀陽敗郁增則風木愈泄是決江河之流而障之以手也不竭不止矣男子淋濁遺精女子崩漏帶下病悉同源而庸工不解其所制各方無可用者李氏用燥土溫中疏肝清下蟄火斂精之法數日而瘳耳聾解張氏少因半産下血虛損中年腹中鬱滿頭目昏暈咽喉有物如草後因媳女卒病驚悸火發自肩上項升騰耳後右耳遂聾數日左耳亦病滯塞怒則更甚頭面麻癢如蜂蟻紛撓心煩生躁則頭上汗流膈右煩熱膠痰瘀塞食下胸悶吐酸項脊筋疼飢則心空氣餒酸水浸淫心神慌亂不寐寐必手足麻軟醒後不能轉移腿脛骨髓空虛筋脈酸楚膝踝浮腫小便赤澀病半年矣此緣士濕火升清陷濁逆陰陽應象論北方生寒在臟為腎在竅為耳耳為腎官亦為心官金匱真言論南方赤色入通於心開竅於耳腎藏精心藏神神為陽精為陰陽清而陰濁清氣上升則孔竅空虛濁氣上逆則孔竅閉塞空虛則善聽閉塞則莫聞而陰根於陽陽根於陰陰生則濁陽生則清清則必升濁則必降蓋水為純陰而內含陽氣此氣左升則化木火是清陽出於濁陰之中也火為純陽而中抱陰精此精右降則化金水是濁陰生於清陽之內也腎水之內一陽常升心火之中一陰常降七竅空虛但有清陽布濩而無一線濁陰稍生閉塞是以聲入耳通巨細必聞非水火相濟精神互交不能如是故耳以一竅而並官心腎心為君火相火者君火之佐也膽以甲木而化相火隨君火而交癸水君相下根則精溫而清升神肅而濁降神胎於魂魂藏於血血統於肝肝膽之氣表裡相合血脫則溫氣亡泄魂虛木陷不能生火化神則心君浮動常有升搖之意而溫泄膽寒甲木失其培養君相感應亦將飛騰其頭目昏暈咽喉梗礙者皆甲木飄揚根本不祕之象也但未全逆耳偶因驚悸卒發君相同奔濁氣上逆孔竅沖塞是以重聽不聞少陽之脈循耳後而下肩項甲木逆沖由經倒上故相火升炎自肩項而繞耳後也君相下行肺金斂之也肺自右降相火上逆肺金被克收令不行故先聾右耳膽自左升續則漸及本位故後聾左耳怒則膽氣更逆是以病加甲木鬱升濁氣紛亂故頭面麻癢如蟻動蜂飛火能上泄金不下斂故頭上汗流肺被火刑故膈右煩熱君相虛浮故心慌膽怯不能寐也究其根原總由陽衰而濕旺太陰以濕土主令而清氣左升則化陽魂陽明從燥金化氣而濁氣右降則生陰魄蓋肺金藏氣而含魄胃為化氣之原氣清則魄凝肝木藏血而含魂脾為生血之本血溫則魂見氣之清者生水之基故精孕於魄血之溫者化火之根故神胎於魂火旺則土燥水盛則土濕燥濟其濕則胃降而脾升濕奪其燥則脾陷而胃逆血脫溫亡瀉其化火之根火衰水盛精臟生寒寒水上泛脾土滋濕濕奪陽明之燥脾陷胃逆故君相拔根而肺失收藏之政也胃土不降濁氣右填肺津郁遏凝為痰涎蒸以君相之火則膠塞不流脾濕不化水穀食下而中焦郁脹肺胃更逆故胸膈壅悶肺氣不得前下逆而上衝後侵太陽之部故項脊筋疼腎主髓靈樞決氣谷入氣滿淖澤注於骨補益腦髓是腎為髓之下源而肺為髓之上源也肺郁化痰無緣下生腎水故骨髓空虛脾陷木遏筋脈不舒故覺酸楚脾主五味入肝為酸土燥則乙木直升土濕則乙木曲陷吞吐酸水者濕土而遭曲木溫氣抑鬱之所化也谷消氣餒胃虛心空之時乙木鬱沖故酸水泛濫陽氣不得下達陰凝氣滯故膝踝浮腫寐而中氣愈郁不能四布故手足麻軟水源上竭膀胱空涸而乙木遏陷疏泄不行是以水道淋澀也靈樞決氣液脫者腦髓消而脛酸精脫者耳聾今骨髓空虛膝脛酸楚孔竅閉塞音響不聞浮據經語參以當年失血甚似精血脫亡陰虛陽盛不知亡血失精瀉其陽根水寒土濕胃逆火升故令病此靈樞邪氣臟腑病形十二經脈三百六十五絡其血氣皆上於面而走孔竅其彆氣走於耳而為聽而膽脈下行正由耳旁靈樞衛氣足少陽之標在窗籠之前窗籠者耳也胃降則膽木下達而耳聰胃逆則膽木上盤而耳聾以耳者宗脈之所聚胃者十二經脈之海宗脈濁降而清升機在陽明通評虛實論頭痛耳鳴九竅不利腸胃之所生也手陽明之燥衰足陽明之濕旺胃不化氣於燥金而化氣於濕土此頭痛耳鳴九竅不利之原也張氏病為制燥土降逆清金斂火暖水升陷疏木達郁之方晨起淨鼻右耳響聲如雷豁然而通鳥語蠅聲聒耳喧心盤水洗面波濤漰沛此以久塞之竅忽得清空虛靈乍復無足為怪晉書殷仲堪父名師嘗病耳聰聞床下蟻動聲若牛鬥亦由宿障新開是以如此午後氣平聲聞如常接服十餘劑加椒附溫下而康目病解玉楸子中外條固夙無苛殃甲寅八月時年三十左目紅澀三日後白睛如血周外腫起漸裹黑珠口乾不飲並無上熱煩渴之證延一醫診之高冠嚴色口沫泉湧以為大腸之火用大黃黃連下之不泄又以重劑下之微泄不愈乃意外有風寒用滾茶一盆覆衣熏蒸汗流至踵不愈有老摳善針輕刺白珠出濁血數十滴如膠紅腫消退頗覺清朗前醫猶謂風火不盡飲以風燥苦寒數十劑漸有飛白拂上如輕霧蒙籠伊謂恐薄翳漸長乃用所謂孫真人祕方名揭障丹一派辛寒日服二次又有熏法名沖翳散藥品如前煎湯熱覆含筒吹熏取汗如雨每日一作如此半月薄翳漸長漸昏蟹睛突生外眥光流似電脾陽大虧數年之內屢病中虛至今未復此緣陽泄土敗木陷火虧金匱真言論東方色青入通於肝開竅於目靈樞脈度肝氣通於目肝和則目能辨五色矣目官於肝而實竅於心解精微論心者五臟之專精目者其竅也蓋肝藏魂肺藏魄腎藏精心藏神腎為陰心為陽五行之性陰靜而陽動靜極則陰凝而為精動極則陽發而為神方其半靜精未凝也而精之陰魄已結方其半動神未發也而神之陽魂先生關尹子精者魄藏之神者魂藏之即此理也陰靜則精凝而為幽陽動則神發而為明神魂者肝心之陽故並官於目心以丁火而含陰根降則化水腎以癸水而含陽根升則化火火降而化濁陰必由心而之肺水升而化清陽必由腎而之肝有陽必升無陰不降升則下濁降則上清陰濁則暗陽清則光清陽之位微陰不存而後神魂發露而為明也清陽上升必由於脈脈之沉者為經浮者為絡頭上經絡清升濁降是謂純陽而諸脈皆屬於目靈樞邪氣腑腑病形十二經脈三百六十五絡其血氣皆上於面面走孔竅其精氣上走於目而為睛是周身之陽無不由脈而上升於目也而諸脈之升則由於心以心主脈而竅於目故諸脈在胸則皆屬於心在頭則皆屬於目心目者同為宗脈之所聚也陽由脈升則清明在上以神生於陽而陽旺於火少陰者君火也太陽者寒水也少陰以君火主令降則下溫而不寒太陽從寒水化氣升則上清而不熱君火之降必協甲木甲木化氣於相火君令臣隨自然之理君相之降司之於金金主收而水主藏收令旺則君相之火由金而歸水神交於精深根寧極而後太陽之上升者清虛而不亂火清則神宇泰定而天光發矣手太陽以丙火而化寒水升則火清金氣不降則君火上炎而刑金相火秉令甲木亦逆肺金被克收令不行火隨經上營血沸騰白睛紅腫陽光散亂清氣陷遏濁氣鬱升雲霧迷漫乃生翳障火退清升雲消霧散翳障自平陽衰氣滯雲翳不退障其神明神虛不能外發久則陽氣陷亡神去而明喪矣左目者陽中之陽也陰陽應象論天不足西北故西北陰也而人右耳目不如左明地不滿東南故東南陽也而人左手足不如右強陽者其精並於上則上明而下虛故其耳目聰明而手足不便也陰者其精並於下則下盛而上虛故其耳目不聰明而手足便也以東方者金水既衰木火方旺清陽當令神魂暢發此升魂所以為貴而降魄所以為賤也而陰魄右降陽魂左升全賴中氣之運中氣運轉胃降脾升則金收西北陰從魄斂木生東南陽自魂發濁陰歸地清陽上天亢倉子所謂清而能久則明也陽衰土濕中氣莫運則升降遲滯四維不轉水陷火逆是以目病水陷則乙木與庚金不升火逆則甲木與辛金不降木主血金主氣乙木庚金不升則氣血之清者下陷甲木辛金不降則氣血之濁者上凝翳膜凝結中氣未敗俟其濁降清升則明覆翳退弗為害也乃火已降矣猶以苦寒泄於下辛燥汗於上內外鏟削元氣敗竭辛金甲木永不能降庚金乙木永不能升則陽常下陷而陰常上逆頭上經絡濁陰沖塞氣血凝澀津液堙瘀翳障層生陽神蔽錮而光明損矣靈樞決氣氣脫者目不明氣統於外而根於中人身下則腎氣上則肺氣中則胃氣外則衛氣氣盛於外故悉統於衛而衛生於穀故並根於中衛氣夜行於陰晝行於陽常隨中氣出入其行於陽也平旦寅初從足太陰之經而出於睛明睛明在目之內眥故目張而能視衛出於目則上下中外之陽隨而俱升陽盛則日月淑清而揚光矣中氣亡泄諸陽俱敗而不升故目不明也五臟生成論肝受血而能視以血藏溫氣升則化火魂舍於血而神生於魂也二十難脫陰者目盲以陽根於陰陰脫則陽根絶也而究其根本悉關中氣後世庸工不解或謂火盛或謂陰虛是以天之中央在燕之北與越之南也至於火退昏翳全由陽敗而再服清潤不亦謬乎眼科如原機啓微一字不通張子和劉守真之論更屬荒誕薛立齊妄載醫案之中趙養葵呂用晦等謬加讚揚繼以證治準繩眼科全書審視瑤函銀海精微龍木禪師諸書真介葛盧管公明所不解也而九域傳誦業此名家從此目病之人皆變離朱而為瞽曠矣何圖天壤之間又有孫真人祕談一書更出諸人之下今千金具在豈思邈仙靈而為此厲鬼那庸愚醉夢習之以膠人目謂非酷歟眼病悉在經絡其赤腫疼痛皆手太陰足少陽二氣之逆沖也法宜清膽肺而降沖逆至於中虛下寒則全宜溫燥白珠紅腫當行其瘀血浮翳初生先破其滯氣自應隨手病除乃不事此妄以汗下亡陽致使中氣頽敗翳障堅老何哉
