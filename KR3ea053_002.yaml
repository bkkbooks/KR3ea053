body:
  text: 卷二五色解上工望而知之中工問而知之下工切而知之六十一難望而知之謂之神聞而知之謂之聖問而知之謂之工切而知之謂之巧神聖工巧優劣懸殊故四診之中首推望色四十九難肝主色自入為青入心為赤入脾為黃入肺為白入腎為黑五色者五臟之氣所發故五臟在中上結五官外現五色肝官於目心官於舌脾官於口肺官於鼻腎官於耳病生五臟則色現五官靈樞五閱五使肝病者眥青心病者舌短顴赤脾病者唇黃肺病者喘息鼻張腎病者顴與顏黑靈樞五色青黑為痛黃赤為熱白為寒五官之中尤重明堂明堂骨高以起平以直潤澤以清真色以致病色不見則五臟安和壯盛無疾骨陷色夭則五臟不安諸病乃作不第五臟凡六腑四肢百節病則色徵於面按部而發靈樞五色五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也此臟腑之現於面部者也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此肢節之現於面部者也左右殊方男女異位浮澤為外沉濁為內察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知病處其色上行者病益甚其色下行如雲徹散者病方已色從外走內者病從外走內色從內走外者病從內走外其相乘制也腎乘心心先病腎為應他皆如是也素問玉機真臟論形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已三部九候論五臟已敗其色必夭夭則死矣靈樞本神心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾盛怒而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂妄不精陰縮而筋攣筋骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂意不存人皮革焦毛悴色夭死於夏腎憂愁而不止則傷志志傷則喜忘其前言腰脊不可以俯仰毛悴色夭死於季夏五臟之外兼審經脈診要經終論太陽之脈其終也戴眼反折瘛瘲其色白絕汗乃出出則死矣少陽終者百節皆縱目睘絕系絕系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下之經盛而不行則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣此十二經之終也靈樞經脈手太陰氣絕則皮毛焦太陰者行氣溫於皮毛皮毛焦則津液去皮節傷爪枯毛折毛折者毛先死丙篤丁死火勝金也手少陰氣絕則脈不通脈不通則血不流血不流則色不澤其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絕則脈不榮其唇舌唇舌者肌肉之本也脈不榮則肌肉軟卻舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也足少陰氣絕則骨枯少陰者伏行而濡於骨髓骨髓不濡則肉不著骨骨肉不相親則肉軟而卻故齒長而垢發無潤澤發無潤澤者骨先死戊篤己死土勝水也足厥陰氣絕則筋絕筋者聚於陰器而絡於舌本脈弗榮則筋急引卵與舌唇青舌卷卵縮則筋先死庚篤辛死金勝木也五陰氣俱絕則目系轉轉則目運目運者志先死志先死則遠一日半死矣六陽氣俱絕則陰與陽相離離則腠理發泄絕汗乃出大如貫珠轉出不流旦占夕死夕占旦死矣經脈之外兼察絡脈經脈十二者伏行分肉之間深而不見其常見者手太陰過外踝之上無所隱故也諸脈之浮而常見者皆絡脈也凡診絡脈青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也靈樞論疾診尺耳間青脈起者掣痛平人氣象論臂多青脈曰脫血經絡論經有常色而絡無常變也陰絡之色應其經陽絡之色變無常隨四時而行也寒多則凝澀凝澀則青黑熱多則淖澤淖澤則黃赤也經脈之外兼觀眸子脈要精微論精明五色者氣之華也赤欲如白裹珠不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼夫精明者所以別白黑觀長短以白為黑以長為短如是則精衰精衰則神敗壽命不久矣三部九候論目匡陷者死神敗故也五臟生成論凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也論疾診尺目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病診寒熱瘰癧赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死四時氣曰觀其色察其目知其散復者視其目色以知病之存亡也蓋色者臟腑經絡之外榮一病見則一色應素問評熱病論諸有水者微腫先見於目下也靈樞水脹水始起也目窠上微腫如新臥起之狀腹脹身皆大大與膚脹等也論疾診尺目痛而色微黃齒垢黃爪甲上黃黃疸也靈樞五色男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首女子色在於面王為膀胱子處之病散為痛摶為聚赤色見於顴大如拇指病雖小愈必卒死黑色出於庭大如拇指必不病而卒死大要以浮澤為生沉夭為死五臟生成論青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豚膏者生黑如烏羽者生此五色之見生也青如草茲者死赤如衃血者死黃如枳實者死黑如炲者死白如枯骨者死此五色之見死也凡精神之舒慘氣血之通塞無不徵之於色病色一見則上工一望而知子長謂越人飲上池而見五臟非解者之言矣五聲解素問三部九候論五色微診可以目察五臟相音可以意識聲者氣之所發氣者肺之所司關尹子金堅故實為五聲也六節臟象論五氣入鼻藏於心肺上使五色修明音聲能彰五臟別論心肺有病鼻為之不利靈樞本神肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息故肺病則見之於氣氣病則見之於聲然五臟皆有氣則五臟皆有聲氣司於肺而傳於五臟則為五氣發於五臟則為五音聞聲而五音以辨則五臟攸分矣四十九難肺主聲入肝為呼入心為言入脾為歌入腎為呻自入為哭蓋人秉五氣而生五臟五氣所發是謂五聲肝秉木氣在音為角在志為怒在聲為呼心秉火氣在音為徵在志為喜在聲為笑脾秉土氣在音為宮在志為憂在聲為歌肺秉金氣在音為商在志為悲在聲為哭腎秉水氣在音為羽在志為恐在聲為呻宣明五氣論五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐靈樞經脈足陽明病則洒洒惡寒苦呻數欠足太陰病則嘔胃脘痛腹脹善噫足少陰病則飢不欲食咳唾則有血喝喝而喘足少陽病則口苦善太息面微有塵體無膏澤陰陽別論二陽一陰發病主驚駭背痛善噫若欠名曰風厥靈樞口問寒氣客於胃厥逆上下散復出於胃故為噫衛氣晝行於陽夜行於陰行陽則寤行陰則寐陽者主上陰者主下陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣和利滿於心出於鼻故為嚏谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦陰氣盛而陽氣虛陰氣疾而陽氣徐故為唏憂思則心系急心系急則氣道約約則不利故太息以伸出之呻者腎之聲也而亦見於足陽明者水勝而侮土也噫者脾之聲也而亦見於手少陰者子病則傳母也素問脈解太陰所謂上走心而噫者陰盛而上走於陽明陽明絡屬心故上走心為噫也喘咳者肺之聲也而亦見於足少陰者子病而累母也二陽者手足陽明一陰者手之厥陰也肝膽主驚此則土金木火發病皆主驚駭者手之陽明則金勝木足之陽明則木勝土手之厥陰則子傳母也欠者腎之聲也水滅火則見於手厥陰侮土則見於足陽明傳子則見於足厥陰傳母則見於手陽明也而諸聲之中莫重於噦素問三部九候論若有七診之病其脈候亦敗者死矣必發噦噫寶命全形論弦絕者其音嘶敗木敷者其葉發病深者其聲噦凡聲不離氣氣之方升而未升則其聲怒氣之方降而未降則其聲悲氣之已降則其聲恐氣之已升則其聲喜氣壯則聲宏氣怯則聲細氣塞則沉鬱而不揚氣散則浮飄而不歸氣滑利則流暢而敏給氣結滯則梗澀而遲發陽氣盛則清而長陰氣盛則濁而促陰陽應象論視喘息聽聲音而知所苦良工聞聲而知病者以氣寓於聲也然氣也而神傳之矣靈樞憂恚無言咽喉者水穀之道也喉嚨者氣之所以上下也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也厭小而薄則開闔利其出氣疾厭大而厚則開闔難其出氣遲而氣之所以遲疾則神之所使也脈要精微論五臟者中之守也中盛臟滿聲如從窖中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也得守者生失守者死故陽虛而見譫言百無一生神敗故也古之言音者於鐸鼓琴瑟無情之物而情達焉聰者審音知其情狀而悉其善惡以聲通乎氣而氣通於神也況人以神氣之激盪發為五聲較之絲竹金石更近自然陸士衡文賦思涉樂其必笑方言哀而已嘆鄧析子體痛者口不能不呼心悅者顏不能不笑莊子強哭者雖悲不哀強親者雖笑不和故語可偽也而聲不可偽神氣之默喻也由五聲而知五氣由五氣而測五神譚子所謂語不靈而聲靈也問法解靈樞師傳臨病人問所便中暑消癉則便寒寒中之屬則便熱問居四診之一中工用藥寒熱不失全憑此法藥之寒熱一違病人所便則藥下而病增矣但寒熱有上下病人所便自有正反凡上熱下寒口嗜寒冷及其入腹而痛滿泄利者便於上而不便於下也從其上之便而違其下之不便是為庸工其寒熱之上下厥有外候胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如麋臍以下皮熱胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而不泄胃中熱腸中寒則疾飢小腹痛脹飧泄靈樞論疾診尺肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱掌中熱者腹中熱掌中寒者腹中寒凡身熱而肢寒者土敗陽虧不能行氣於四肢也頭熱而足寒者土敗火泄不能下蟄於癸水也朝涼而暮熱者日夕陰盛而陽氣不藏也發熱而惡寒者表閉經鬱而陽氣不達也陽郁不發則生外寒外寒者容有內熱陽泄不歸則生外熱外熱者多有內寒此臟腑寒熱之外候也問其身上之寒熱問其飲食所便之寒熱參之則無微不彰矣飲食者臟腑所消受也脾以濕土主令胃從燥金化氣燥濕均平則脾升而善消胃降而善受食而不飢者能受不能消也飢而不食者能消不能受也喜吞乾燥者水旺而土濕也嗜啖滋潤者火盛而土燥也食宿不能化者太陰之濕增也食停而不消者陽明之燥減也早食而困倦者陽衰而濕旺也晚飯而脹滿者陰盛而燥虛也水穀下咽而胸膈壅塞者胃逆而不降也飲食入胃而臍腹鬱悶者脾陷而不升也胃逆而甲木上遏則胸脅生痛脾陷而乙木下抑則臍肋作痛甲木刑胃則生嘔吐嘔吐者胃逆而不受也乙木賊脾則生泄利泄利者脾陷而不消也水之難化較甚於谷水穀消磨化而為氣上歸肺部氣降津生由經絡而滲膀胱是為小便水注於前則谷傳於後而大便堅硬陽衰土濕但能化谷不能化水水穀併入於二腸故大便利而小便澀木性上達水盛土濕脾氣下陷抑乙木升達之性鬱怒衝突則生痛脹沖而莫達則下決穀道而為溏泄小便之利木泄之也水入二腸而不入膀胱故乙木下泄但能開其穀道不能開其水道水道不通短澀而黃赤者土濕木陷而不能泄也淋瀝之家小便偏澀噎膈之家大便偏塞雖溺色紅濁糞粒堅小而實緣脾土濕寒木鬱不能疏泄郁陷而生風熱傳於下竅無關於中焦也庚桑子人鬱則為病中氣堙塞四維莫運由是而蒸為五氣瘀為五味淫為五液發為五聲徵為五色感為五情臊者肝之氣也焦者心之氣也香者脾之氣也腥者肺之氣也腐者腎之氣也酸者肝之味也苦者心之味也甘者脾之味也辛者肺之味也咸者腎之味也淚者肝之液也汗者心之液也涎者脾之液也涕者肺之液也唾者腎之液也呼者肝之聲也笑者心之聲也歌者脾之聲也哭者肺之聲也呻者腎之聲也青者肝之色也赤者心之色也黃者脾之色也白者肺之色也黑者腎之色也怒者肝之情也喜者心之情也憂者脾之情也悲者肺之情也恐者腎之情也寤寐者陰陽之動靜也衛氣晝行於六經則陽動而為寤夜行於五臟則陰靜而為寐而衛氣之出入司之中氣陽衰土濕陽明不降則衛氣升逆而廢眠睡衛秉金氣其性收斂收斂失政而少陽不蟄則膽木虛飄而生驚恐虛勞之家驚悸不寐者土敗而陽泄也痛癢者氣血之鬱塞也經絡壅滯氣阻而不行則為痛行而不暢則為癢內外感傷諸病筋脈痛楚而皮膚瘙癢者皆經氣之閉痹也一證之見必有至理內而五臟六腑外而四肢九竅凡寒熱痛癢飲食寤寐聲色臭味情志形神之類質問詳悉合而審焉病如洞垣矣問法在於善解解極其徹則問致其詳不解者不能問也診法解素問脈要精微論診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈上古診有三法一則三部九候以診周身一則氣口人迎以候陰陽一則但診氣口後世之所宗也三部九候論人有三部部有三候三候者有天有地有人也上部天兩額之動脈足少陽之頷厭上部地兩頰之動脈足陽明之地倉大迎上部人耳前之動脈手少陽之和髎中部天手太陰也太淵經渠即寸口之動脈中部地手陽明也合谷在大指次指歧骨之間中部人手少陰也神門在臂內後廉掌後銳骨之間下部天足厥陰也五里在毛際外羊矢下一寸陷中女子取太衝在大指本節後二寸陷中下部地足少陰也太谿在內踝後跟骨上陷中下部人足太陰也箕門在五里下魚腹上胃氣則候於陽明之衝陽在足跗上即仲景所謂趺陽也下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胸中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病所謂七診也七診雖見九候不從者不死若有七診之病其脈候亦敗者死三部九候皆相失者死中部乍數乍疏者死九候之脈皆沉細弦絕者為陰以夜半死躁盛喘數者為陽以日中死氣交變論歲木太過風氣流行脾土受邪衝陽絕死不治歲火太過炎暑流行肺金受邪太淵絕死不治歲土太過雨濕流行腎水受邪太谿絕死不治歲金大過燥氣流行肝木受邪太衝絕死不治歲水太過寒氣流行心火受邪神門絕死不治是皆三部九候之法也氣口者手太陰之經魚際下之動脈人迎者足陽明之經結喉旁之動脈氣口臟脈臟陰盛則氣口大於人迎虛則小於人迎人迎腑脈腑陽盛則人迎大於寸口虛則小於寸口靈樞九針十二原氣口候陰人迎候陽陽明行氣於三陽故以之候表太陰行氣於三陰故以之候里靈樞禁服寸口主中人迎主外春夏人迎微大秋冬寸口微大如是者命曰平人人迎大一倍於寸口病在足少陽一倍而躁在手少陽人迎二倍病在足太陽二倍而躁在手太陽人迎三倍病在足陽明三倍而躁在手陽明盛則為熱虛則為寒緊則痛痹代則乍甚乍間人迎四倍且大且數名曰溢陽溢陽為外格死不治寸口大一倍於人迎病在足厥陰一倍而躁在手心主寸口二倍病在足少陰二倍而躁在手少陰寸口三倍病在足太陰三倍而躁在手太陰盛則脹滿寒中食不化虛則熱中出麋少氣溺色變緊則痛痹代則乍痛乍止寸口四倍且大且數名曰溢陰溢陰為內關死不治靈樞經脈人迎與脈口俱盛四倍以上名曰關格關格者與之短期靈樞五色人迎盛堅者傷於寒氣口盛堅者傷於食以傷食則臟鬱於里故氣口盛堅傷寒則經鬱於表故人迎盛堅也但診氣口者靈樞經脈經脈者常不可見也其虛實也以氣口知之緣肺朝百脈十二經之脈氣皆朝宗於肺脈寸口者脈之大會一日一夜脈行五十度平旦而復會於寸口肺主氣經脈之動者肺氣鼓之也肺氣行於十二經中故十二經之盛衰悉見於寸口此氣口所以獨為五臟主也寸口在魚際之分關上在太淵之分尺中在經渠之分即三部九候論所謂中部天也脈要精微論尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾兩關部也上附上右外以候肺內以候胸中左外以候心內以候膻中兩寸部也前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也關前為陽關後為陰陽者主上陰者主下凡脈氣上行者病見於上脈氣下行者病見於下手之三陽自手走頭大小腸位居至下而脈則行於至上故與心肺同候於兩寸庸醫乃欲候大小腸於兩尺不通之至越人十難一脈十變之義十八難尺寸三部之法氣口脈法之祖也下士不解是以妄作如此氣口之中又有但診尺脈之法靈樞垂論疾診尺之篇曰審其尺之緩急小大滑澀肉之堅脆而病形定矣蓋觀上可以知下察下可以知上所謂善調寸者不待於尺善調尺者不待於寸也人與天地相參也天地之氣四時迭運人之脈氣與之息息相應毫髮不爽故春之脈升夏之脈浮秋之脈降冬之脈沉宣明五氣肝脈弦心脈鉤脾脈代肺脈毛腎脈石脈要精微論天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下以春應中規夏應中矩秋應中衡冬應中權是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死時微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室玉機真臟論春脈如弦春脈者肝也東方木也萬物之所以始生也其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善怒忽忽眩冒而顛疾不及則令人胸痛引背下則兩脅胠滿夏脈如鉤夏脈者心也南方火也萬物之所以盛長也其氣來盛去衰故曰鉤反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄秋脈如浮秋脈者肺也西方金也萬物之所以收成也其氣來輕虛以浮來急去散故曰浮反此者病其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音冬脈如營冬脈者腎也北方水也萬物之所以合藏也其氣來沉以搏故曰營反此者病其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變脾脈者土也孤臟以灌四旁者也善者不可見惡者可見其來如水之流者此謂太過病在外如烏之喙者此謂不及病在中太過則令人四肢不舉不及則令人九竅不通名曰重強平人氣象論平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病臟真散於肝肝藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病臟真通於心心藏血脈之氣也長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死代乃脾之平脈言隨四時更代與代止不同也軟弱有石曰冬病石甚曰今病臟真濡於脾脾藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺以行營衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也平心脈來累累如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鈞曰心死平肺脈來厭厭聶聶如落榆英曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益勁如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來銳堅如烏之喙如鳥之距如屋之漏如水之流曰脾死平腎脈來喘喘累累如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死諸死脈皆真臟也玉機真臟論大骨枯槁大肉陷下胸中氣滿喘息不便其氣動形期六月死真臟脈見乃與之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃與之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破㿉真臟見十日之內死大骨枯槁大肉陷下肩髓內消動作並衰真臟未見期一歲死見其真臟乃與之期日大骨枯槁大肉陷下胸中氣滿心中不便腹內痛引肩項身熱破㿉脫肉目匡陷真臟見目不見人立死其見人者至其所不勝之時則死其脈絕不來若人一呼五六至其形肉不脫真臟雖不見猶死也所謂不勝之時者肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見皆死人以水穀為本故人絕水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不見胃氣也所謂真臟脈者真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子累累然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死真腎脈至搏而絕如指彈石辟辟然色黑黃不澤毛折乃死諸真臟脈見者皆死不治也五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰各以其時自胃而至於手太陰邪氣勝者精氣衰也病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死遲速者陰陽自然之性也人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息脈六動命曰平人平人者不病也陽性急陰性緩陽泄則脈數陰凝則脈遲數則為熱遲則為寒十四難一呼三至曰離經一呼四至曰奪精一呼五至曰死一呼六至曰命經此至之脈也一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此損之脈也浮沉者陰陽自然之體也心肺俱浮腎肝俱沉浮而大數者心也浮而短澀者肺也沉而實堅者腎也沉而牢長者肝也五難初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也陽主外陰主內陽泄則脈浮陰凝則脈沉浮為在表沉為在裡病甚者沉細夜加浮大晝加沉細夜死浮大晝死陰陽之理彼此互根陽位於上而根於下陰位於下而根於上陽盛者下侵陰位而見沉數不可以為陰旺陰盛者上侵陽位而見浮數不可以為陽旺是當參伍而盡變也代者數疏之不調也靈樞根結一日一夜五十營以營五臟之精不應數者名曰狂生五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣與之短期與之短期者乍疏乍數也乍疏乍數者代更之象與宣明五氣之言代不同也呼吸者氣之所以升降也四難呼出心與肺吸入腎與肝呼吸之間脾受穀味也其脈在中呼則氣升於心肺吸則氣降於腎肝一呼一吸經脈五動之間即可以候五臟氣不至於一臟則脈必代矣十一難吸者隨陰入呼者因陽出今吸不能至腎至肝而還故知一臟無氣者腎氣先盡也由腎而肝由肝而脾由脾而心由心而肺可類推也氣盡則死其死期之遲速不應者倉公所謂安穀者則過期不安穀者不及期也尺寸者陰陽之定位也男女殊稟陰陽不同受氣既別診法亦異十九難男脈在關上女脈在關下男子尺脈恆弱寸脈恆盛女子尺脈恆盛寸脈恆弱是其常也故有男子之平脈女得之而病作女子之病脈男得之而疾瘳此秉賦之定數也醫方解醫自岐伯立言仲景立法百世之師也後此惟思邈真人祖述仲景金匱之法作千金之方不失古聖之源其餘方書數百種言則荒唐而訛謬法則怪妄而差池上自東漢以來下自昭代以還著作如林竟無一線微通者今之庸愚習用諸方如四物八珍七寶六味歸脾補心滋腎養營之類紛紜錯出不可勝數是皆無知妄作誤人性命而下士奉行不替百世不生聖人千里不產賢士何凌夷以至於斯耶驚悸之證其在傷寒皆得之汗多陽亡惟少陽之證相火鬱發或以汗下傷陰甲木枯槁內賊戊土乃有小建中炙甘草證重用芍藥生地以清相火至於內傷虛勞驚悸不寐俱緣水寒土濕神魂不藏無相火上旺而宜清潤者即其千百之中偶而有之而究其脾腎終是濕寒嚴用和貿昧而造歸脾之方以補心血薛立齋又有丹皮梔子加味之法張景岳趙養葵高鼓峰呂用晦更增地黃芍藥之輩復有無名下士作天王補心丹肆用一派陰涼群兒醉夢不醒成此千秋殺運可恨極矣夜熱之證因陰旺土濕肺胃不降君相失根二火升泄錢仲陽乃作六味湯丸以滋陰虧薛氏推廣其義以治男女勞傷各種雜病張氏趙氏高氏呂氏祖述而發揚之遂成海內惡風致令生靈夭札死於地黃者最多其何忍乎下至二地二冬龜板黃柏諸法不可縷悉究其源流瀉火之論發於劉河間補陰之說倡於朱丹溪二悍作俑群凶助虐莫此為甚足之三陽自頭走足凡胸脅壅滿上熱燔蒸皆足陽明少陽之不降也李東垣乃作補中益氣之方以升麻柴胡升膽胃之陽謬矣而當歸黃耆亦復支離無當薛氏輩效尤而習用之遂成不刊之法風寒之證仲景之法備矣陶節庵妄作九味羌活之法雜亂無律而俗子遵行天下同符棄圭璧而寶砆碔那可解也諸如此類連床充棟更僕難明昔徐世績少年作無賴賊逢人則殺檢閱古今方書何其無賴賊之多而仁人君子之少也設使賈太傅尚在不知如何痛哭矣
