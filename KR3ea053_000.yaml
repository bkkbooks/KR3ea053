front:
  text: 序意玉楸先生宰思捐慮氣漠神融清耳而聽明目而視既遭庸醫之禍乃喟然太息仰榱而嘆曰是余之罪也夫昔杜子夏殷仲堪輩禍劇折肽而未嘗遊思醫事後之病者不能遁天之刑也古之至人視聽不用耳目自茲吾作庚桑子矣杜門謝客罄心渺慮思黃帝岐伯越人仲景之道三載而悟乃知夫聖人之言冥冥所以使人盲也軒岐既往靈素猶傳世歷三古人更四聖當途而後赤水迷津而一火薪傳何敢讓焉因溯四聖之心傳作素靈微蘊二十有六篇原始要終以究天人之際成一家之言藏諸空山以待後之達人歲在庚申九月二十八日草成悲夫昔屈子呂氏之倫咸以窮愁著書自見於後垂諸竹素不可殫述使非意有鬱結曷能冥心於沖虛之表鶩精於恍惚之庭論書策以抒懷垂文章以行遠哉杝元玉楸子著素靈微蘊既成徇華之客以為不急之務虛緪歲月乃述上聖之功剖作者之意作杝元以解嘲其辭曰涒灘之歲節屆初冬玉楸子獨處乎寒青之館神寧於遙碧之亭時則玄陰晦朔素雪飄零梧槭槭而葉墮松謖謖而風清閒庭寂寥不聞人聲有北里望人者軒車南駕駐轡相過袨服綷縩高冠偉峨揚眉張頰言湧如波聞子窮年作解一空冥搜椓天地之奧鍥鬼神之幽障千尋之浪掃五里之霧信乎玉楸子曰唯客乃傲傲而笑曰吁嗟吾子茫乎愚矣乃者乾光耀採文運璘斌群才云駭萬匯煙屯人附虯龍之翼家蔭鸞鳳之林蔚然如長風之凌勁翮蕩乎若大壑之縱遊鱗是以朝無佞祿野無偽隱滋蘭蕙之不足又曷事乎析薪今吾子匿秀山巔藏雲水曲棲心於恍惚之庭梏神於冥漠之麓意疲精殫手胼口瘃仰遠騖乎九霄俯深釣於窮谷縱彰微理於遐年暢名言於遺錄曾不得掇巍科闞朝軸凌高軒紆佩玉洵所謂刻棘端之沐猴鏤冰玉之畫𨌥人以為結珞之與璵璠吾以為燕石之與鼠璞況今醫子蜂生方書代作人自以為俞跗家自以為扁鵲附托貴遊憑依高爵舒虹霓以著塵攀驪龍而云薄莫不意色𥕎礚聲華灼爍今吾子足不出於方州行不越乎閭里抱一篇以長吟面百城以自喜仰屋梁以咨嗟撫空幾而嘆只子不如還車息駕折柱摧弦蕭涼書閣寂寞云檐松聲兩岸花影一簾於焉嘯樂可以盤桓何為涉彼漫漫之歧路遣此駸駸之歲年玉楸子振臂而起仰天而噓夫聞清商而謂角非徽弦之過聽者之不聰也見和璧而曰石非瓊瑤之賤視者之不明也世皆寶瓴甋而憎琬璞重笳拍而棄鍾呂又何詫乎子之舌讕讕而口詝詝厥初生民風淳氣平渾固敦龐人鮮疾病五子相蕩二氣初競夭札疵癘楛窳厥性乃有黃帝運起天鍾傳經玉版示藥昆峰道遵岐伯業受雷公向天老而問鳳驅黃神以馭龍補造化之缺漏濟民物之傷殘功與天地相併術與鬼神通玄遐哉邈矣不可得而述殫無何鼎湖一去攀髯長號云迷大谷鬼哭秋郊黎丘晝市裊鶹夜咷人誤藥術家習圭刀雙目戢戢眾口呶呶聆其議論則風飛雲逸溯厥指歸則煙籠霧飄無不齒有刃而舌有劍胸有斧而手有刀似此悠悠何足談悉遙望前修慨而嘆矣關情玉機阻雋靈蘭如墨如漆亦幾千年誰從此日握要鉤玄相煦以懊相濯以寒至於僕者丘園散誕松菊徘徊慕仲長統之樂志企趙元叔之壯懷曉云西去夜月東來揮落葉哀鴻之曲傾梅花寒雪之杯既息心以遺累復違俗而舒襟良無求於富貴亦何羨乎盧文乃偶攖末疾見誤庸醫夷然太息鍵戶深思澄心凝慮六年於茲當其午夜篝燈心源默闢擢筆靈飛撫幾神驀砉然天開磔然理易於是鑿先聖未雕之璞探千秋永墜之奇騰幽振微破險開迷閎言眇旨磅礴陸離不知茲固不足以揚天地之大化繼古聖之匡維衷群言之淆亂回蒼生之顛沛也嗚呼玄風既邈大道遂淪世憎其璞人惡其真率信耳而疑目咸譽古而疵今季主揲卦賈生有居鄙之誚子云著書劉子發覆瓿之言故孟堅寄慨於賓戲之作景純述意於客傲之篇縱受嗤於一世終留譽於萬年彼流俗之謠諑亦何屑而論旃今子失轡於康莊之路熏心於榮利之場雖目動而言肆實墨明而狐蒼乃欲持眇見以訾大道是何異乘車鼠穴而欲窮章臺之廣狹企足蟻封而欲測渤海之渺茫也不亦妄歟
